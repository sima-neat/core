name: R2 Artifact Maintenance

on:
  schedule:
    # Daily at 03:15 UTC
    - cron: "15 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set to true to preview deletions without removing objects."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: s3-artifact-maintenance
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: CloudFlare-R2
    env:
      S3_BUCKET: neat-artifacts
      NON_LATEST_RETENTION_DAYS: "2"
      AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

    steps:
      - name: Resolve execution mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "dry_run=false" >> "${GITHUB_OUTPUT}"
          else
            echo "dry_run=${{ inputs.dry_run || 'true' }}" >> "${GITHUB_OUTPUT}"
          fi
          echo "Dry run mode: $(cat "${GITHUB_OUTPUT}" | awk -F= '/^dry_run=/{print $2}')"

      - name: Verify aws cli is available
        run: |
          aws --version

      - name: Cleanup expired artifact objects
        env:
          DRY_RUN: ${{ steps.mode.outputs.dry_run }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          now_epoch="$(date +%s)"
          deleted_count=0
          kept_count=0
          scanned_count=0

          declare -A active_branches=()
          declare -A active_tags=()
          declare -A latest_tags=()

          delete_or_echo() {
            local key="$1"
            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "[dry-run] delete s3://${S3_BUCKET}/${key}"
            else
              aws s3api delete-object --bucket "${S3_BUCKET}" --key "${key}" --endpoint-url "${R2_ENDPOINT_URL}" >/dev/null
              echo "deleted s3://${S3_BUCKET}/${key}"
            fi
          }

          is_release_branch() {
            local branch="$1"
            [[ "${branch}" =~ ^release-[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]] ||
              [[ "${branch}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]
          }

          load_active_branches() {
            local page=1
            local response
            local branch_name
            local branch_key

            while :; do
              response="$(curl -fsSL \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/branches?per_page=100&page=${page}")"

              if [[ "$(jq 'length' <<<"${response}")" == "0" ]]; then
                break
              fi

              while IFS= read -r branch_name; do
                [[ -z "${branch_name}" ]] && continue
                branch_key="$(echo "${branch_name}" | tr '/ ' '--')"
                active_branches["${branch_key}"]=1
              done < <(jq -r '.[].name // empty' <<<"${response}")

              if [[ "$(jq 'length' <<<"${response}")" -lt 100 ]]; then
                break
              fi
              page=$((page + 1))
            done
          }

          load_active_tags() {
            local page=1
            local response
            local tag_name
            local tag_key

            while :; do
              response="$(curl -fsSL \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/tags?per_page=100&page=${page}")"

              if [[ "$(jq 'length' <<<"${response}")" == "0" ]]; then
                break
              fi

              while IFS= read -r tag_name; do
                [[ -z "${tag_name}" ]] && continue
                tag_key="$(echo "${tag_name}" | tr '/ ' '--')"
                active_tags["${tag_key}"]=1
              done < <(jq -r '.[].name // empty' <<<"${response}")

              if [[ "$(jq 'length' <<<"${response}")" -lt 100 ]]; then
                break
              fi
              page=$((page + 1))
            done
          }

          load_latest_tags() {
            local token=""
            local response
            local key
            local branch
            local tag

            while :; do
              if [[ -n "${token}" ]]; then
                response="$(aws s3api list-objects-v2 \
                  --bucket "${S3_BUCKET}" \
                  --prefix "core/" \
                  --continuation-token "${token}" \
                  --endpoint-url "${R2_ENDPOINT_URL}" \
                  --output json)"
              else
                response="$(aws s3api list-objects-v2 \
                  --bucket "${S3_BUCKET}" \
                  --prefix "core/" \
                  --endpoint-url "${R2_ENDPOINT_URL}" \
                  --output json)"
              fi

              while IFS= read -r key; do
                [[ "${key}" != core/*/latest.tag ]] && continue
                branch="${key#core/}"
                branch="${branch%/latest.tag}"
                tag="$(aws s3 cp --endpoint-url "${R2_ENDPOINT_URL}" "s3://${S3_BUCKET}/${key}" - 2>/dev/null | tr -d '[:space:]' || true)"
                if [[ -n "${tag}" ]]; then
                  latest_tags["${branch}"]="${tag}"
                fi
              done < <(jq -r '.Contents[]?.Key // empty' <<<"${response}")

              token="$(jq -r '.NextContinuationToken // empty' <<<"${response}")"
              if [[ -z "${token}" ]]; then
                break
              fi
            done
          }

          keep_as_latest() {
            local branch="$1"
            local artifact_path="$2"
            local latest_tag="${latest_tags[${branch}]:-}"

            [[ -n "${active_branches[${branch}]:-}" ]] || return 1

            if [[ "${artifact_path}" == "latest.tag" ]]; then
              return 0
            fi
            if [[ "${artifact_path}" == "latest" ]] || [[ "${artifact_path}" == latest/* ]]; then
              return 0
            fi

            if [[ -n "${latest_tag}" ]]; then
              if [[ "${artifact_path}" == "${latest_tag}" ]] || [[ "${artifact_path}" == "${latest_tag}/"* ]]; then
                return 0
              fi
            fi

            return 1
          }

          cleanup_prefix() {
            local prefix="$1"
            local token=""
            local artifact_path=""
            local branch=""
            local retention_days="${NON_LATEST_RETENTION_DAYS}"

            echo "Scanning prefix: ${prefix}/"
            while :; do
              if [[ -n "${token}" ]]; then
                response="$(aws s3api list-objects-v2 \
                  --bucket "${S3_BUCKET}" \
                  --prefix "${prefix}/" \
                  --continuation-token "${token}" \
                  --endpoint-url "${R2_ENDPOINT_URL}" \
                  --output json)"
              else
                response="$(aws s3api list-objects-v2 \
                  --bucket "${S3_BUCKET}" \
                  --prefix "${prefix}/" \
                  --endpoint-url "${R2_ENDPOINT_URL}" \
                  --output json)"
              fi

              while IFS= read -r obj; do
                key="$(jq -r '.Key' <<<"${obj}")"
                last_modified="$(jq -r '.LastModified' <<<"${obj}")"
                scanned_count=$((scanned_count + 1))

                # Expected shape: <prefix>/<branch>/<artifact...>
                rel="${key#${prefix}/}"
                if [[ "${rel}" == "${key}" ]] || [[ "${rel}" != */* ]]; then
                  kept_count=$((kept_count + 1))
                  continue
                fi

                branch="${rel%%/*}"
                artifact_path="${rel#*/}"

                # Remove all objects for refs (branch/tag) that no longer exist.
                if [[ -z "${active_branches[${branch}]:-}" && -z "${active_tags[${branch}]:-}" ]]; then
                  delete_or_echo "${key}"
                  deleted_count=$((deleted_count + 1))
                  continue
                fi

                if is_release_branch "${branch}"; then
                  kept_count=$((kept_count + 1))
                  continue
                fi

                if keep_as_latest "${branch}" "${artifact_path}"; then
                  kept_count=$((kept_count + 1))
                  continue
                fi

                obj_epoch="$(date -d "${last_modified}" +%s)"
                age_days=$(((now_epoch - obj_epoch) / 86400))

                if (( age_days >= retention_days )); then
                  delete_or_echo "${key}"
                  deleted_count=$((deleted_count + 1))
                else
                  kept_count=$((kept_count + 1))
                fi
              done < <(jq -c '.Contents[]?' <<<"${response}")

              token="$(jq -r '.NextContinuationToken // empty' <<<"${response}")"
              if [[ -z "${token}" ]]; then
                break
              fi
            done
          }

          load_active_branches
          load_active_tags
          load_latest_tags
          echo "Active branches discovered: ${#active_branches[@]}"
          echo "Active tags discovered: ${#active_tags[@]}"
          echo "Latest tags discovered: ${#latest_tags[@]}"

          cleanup_prefix "core"

          echo "Scan complete."
          echo "Scanned objects: ${scanned_count}"
          echo "Deleted objects: ${deleted_count}"
          echo "Kept objects: ${kept_count}"

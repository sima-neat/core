name: S3 Artifact Maintenance

on:
  schedule:
    # Daily at 03:15 UTC
    - cron: "15 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set to true to preview deletions without removing objects."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: s3-artifact-maintenance
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      S3_BUCKET: sima-neat-artifacts
      MAIN_RETENTION_DAYS: "30"
      NON_MAIN_RETENTION_DAYS: "7"

    steps:
      - name: Resolve execution mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "dry_run=false" >> "${GITHUB_OUTPUT}"
          else
            echo "dry_run=${{ inputs.dry_run || 'true' }}" >> "${GITHUB_OUTPUT}"
          fi
          echo "Dry run mode: $(cat "${GITHUB_OUTPUT}" | awk -F= '/^dry_run=/{print $2}')"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cleanup expired artifact objects
        env:
          DRY_RUN: ${{ steps.mode.outputs.dry_run }}
        run: |
          set -euo pipefail

          now_epoch="$(date +%s)"
          deleted_count=0
          kept_count=0
          scanned_count=0

          delete_or_echo() {
            local key="$1"
            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "[dry-run] delete s3://${S3_BUCKET}/${key}"
            else
              aws s3api delete-object --bucket "${S3_BUCKET}" --key "${key}" >/dev/null
              echo "deleted s3://${S3_BUCKET}/${key}"
            fi
          }

          cleanup_prefix() {
            local prefix="$1"
            local token=""

            echo "Scanning prefix: ${prefix}/"
            while :; do
              if [[ -n "${token}" ]]; then
                response="$(aws s3api list-objects-v2 \
                  --bucket "${S3_BUCKET}" \
                  --prefix "${prefix}/" \
                  --continuation-token "${token}" \
                  --output json)"
              else
                response="$(aws s3api list-objects-v2 \
                  --bucket "${S3_BUCKET}" \
                  --prefix "${prefix}/" \
                  --output json)"
              fi

              while IFS= read -r obj; do
                key="$(jq -r '.Key' <<<"${obj}")"
                last_modified="$(jq -r '.LastModified' <<<"${obj}")"
                scanned_count=$((scanned_count + 1))

                # Expected shape: <prefix>/<branch>/<artifact...>
                rel="${key#${prefix}/}"
                if [[ "${rel}" == "${key}" ]] || [[ "${rel}" != */* ]]; then
                  kept_count=$((kept_count + 1))
                  continue
                fi

                branch="${rel%%/*}"
                retention_days="${NON_MAIN_RETENTION_DAYS}"
                if [[ "${branch}" == "main" ]]; then
                  retention_days="${MAIN_RETENTION_DAYS}"
                fi

                obj_epoch="$(date -d "${last_modified}" +%s)"
                age_days=$(((now_epoch - obj_epoch) / 86400))

                if (( age_days >= retention_days )); then
                  delete_or_echo "${key}"
                  deleted_count=$((deleted_count + 1))
                else
                  kept_count=$((kept_count + 1))
                fi
              done < <(jq -c '.Contents[]?' <<<"${response}")

              token="$(jq -r '.NextContinuationToken // empty' <<<"${response}")"
              if [[ -z "${token}" ]]; then
                break
              fi
            done
          }

          cleanup_prefix "neat"
          cleanup_prefix "neat-internals"

          echo "Scan complete."
          echo "Scanned objects: ${scanned_count}"
          echo "Deleted objects: ${deleted_count}"
          echo "Kept objects: ${kept_count}"

name: R2 Artifact Maintenance

on:
  schedule:
    # Daily at 03:15 UTC
    - cron: "15 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set to true to preview deletions without removing objects."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: s3-artifact-maintenance
  cancel-in-progress: false

jobs:
  prune:
    uses: sima-neat/.github/.github/workflows/reusable-prune-download-artifacts.yml@main
    with:
      bucket: neat-artifacts
      environment_name: CloudFlare-R2
      artifact_root: core
      keep_hours: 48
      dry_run: ${{ github.event_name != 'schedule' && inputs.dry_run == 'true' }}
      aws_region: auto
      install_awscli: false
    secrets:
      aws_access_key_id: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      aws_secret_access_key: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      r2_account_id: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}

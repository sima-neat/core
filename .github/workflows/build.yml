name: Standard Build & Archive

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  workflow_dispatch: {}

jobs:
  format-hygiene:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install formatting/lint tools
        run: |
          ./build.sh --install-deps-only

      - name: Check internal header hygiene
        run: |
          ./scripts/check_internal_headers.sh

      - name: Check C/C++ formatting (changed files)
        run: |
          ./scripts/check_format.sh --changed-only --verbose

      - name: Check CMake style (changed files)
        run: |
          ./scripts/check_cmake_format.sh --changed-only

      - name: Check duplicate includes (changed files)
        run: |
          ./scripts/check_duplicate_includes.sh --changed-only

  clang-tidy:
    runs-on: [self-hosted, Linux, X64]
    needs: format-hygiene

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-tidy
        run: |
          if command -v clang-tidy >/dev/null 2>&1 && command -v rg >/dev/null 2>&1; then
            echo "clang-tidy and ripgrep already installed."
            exit 0
          fi

          if [ "$(id -u)" -eq 0 ]; then
            apt-get update
            apt-get install -y clang-tidy ripgrep
            exit 0
          fi

          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo -n apt-get update
            sudo -n apt-get install -y clang-tidy ripgrep
            exit 0
          fi

          echo "Missing clang-tidy or ripgrep, and cannot install without passwordless sudo on this runner." >&2
          echo "Preinstall these packages on the x86 runner or enable passwordless sudo for the runner user." >&2
          exit 1

      - name: Install build dependencies
        run: |
          ./build.sh --install-deps-only

      - name: Run clang-tidy
        env:
          SIMANEAT_STRICT_WARNINGS: "ON"
        run: |
          ./scripts/run_cpp_tidy.sh --changed-only

      - name: Finishing off
        run: |
          echo "clang-tidy already executed in scripts/run_cpp_tidy.sh"

  build:
    runs-on: [self-hosted, Linux, X64, elxr-sdk]
    needs: clang-tidy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          echo "Preparing build environment on private machine..."

      - name: Build Project
        env:
          SIMANEAT_STRICT_WARNINGS: "OFF"
        run: |
          ./build.sh --all --clean --no-doc

      - name: Verify build artifacts
        run: |
          ls -lh ./*.deb
          ls -lh ./*extras.tar.gz
          ls -lh dist/*.whl

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Compute S3 artifact prefixes
        id: s3-prefix
        run: |
          BRANCH_RAW="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          BRANCH_KEY="$(echo "${BRANCH_RAW}" | tr '/ ' '--')"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "branch_key=${BRANCH_KEY}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "commit_prefix=s3://sima-neat-artifacts/neat/${BRANCH_KEY}/${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "latest_prefix=s3://sima-neat-artifacts/neat/${BRANCH_KEY}/latest" >> "${GITHUB_OUTPUT}"

      - name: Prepare artifact payload and metadata
        run: |
          CORE_DEB="$(ls -1 ./*-Linux-core.deb | head -n1)"
          EXTRAS_TAR="$(ls -1 ./*extras.tar.gz | head -n1)"
          WHEEL_PATH="$(ls -1 dist/*.whl | head -n1)"
          bash tools/prepare_s3_artifacts.sh \
            --core-deb "${CORE_DEB}" \
            --extras-tar "${EXTRAS_TAR}" \
            --wheel "${WHEEL_PATH}" \
            --internals-manifest neat-internals/manifest.json \
            --output-dir "${GITHUB_WORKSPACE}/_work/upload-artifacts"
          cp neat-internals/manifest.json "${GITHUB_WORKSPACE}/_work/upload-artifacts/manifest.json"

      - name: Upload artifacts to S3
        run: |
          for f in "${GITHUB_WORKSPACE}"/_work/upload-artifacts/*; do
            aws s3 cp "${f}" "${{ steps.s3-prefix.outputs.commit_prefix }}/"
          done

  test:
    runs-on: [self-hosted, Linux, ARM64, modalix]
    needs: build

    steps:
      - name: Clean test workspace
        run: |
          rm -rf _work
          mkdir -p _work

      - name: Install test runtime from metadata-all
        env:
          DEVKIT_PASSWORD: ${{ secrets.DEVKIT_PASSWORD }}
        run: |
          if ! command -v sima-cli >/dev/null 2>&1; then
            echo "sima-cli not found on test runner." >&2
            exit 1
          fi
          BRANCH_RAW="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          BRANCH_KEY="$(echo "${BRANCH_RAW}" | tr '/ ' '--')"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          METADATA_URL="https://neat-artifacts.modalix.info/neat/${BRANCH_KEY}/${SHORT_SHA}/metadata-all.json"
          echo "Installing from ${METADATA_URL}"
          sima-cli install -m "${METADATA_URL}"

      - name: Locate installed extras content
        run: |
          mapfile -t CTEST_FILES < <(find /media/nvme "${HOME}" -type f -path '*/lib/sima-neat/tests/CTestTestfile.cmake' -printf '%T@ %p\n' 2>/dev/null | sort -nr | awk '{print $2}')
          if [[ "${#CTEST_FILES[@]}" -eq 0 ]]; then
            echo "Unable to locate installed extras tests after sima-cli install." >&2
            exit 1
          fi
          EXTRAS_LIB_DIR="$(dirname "$(dirname "${CTEST_FILES[0]}")")"
          echo "Using extras lib dir: ${EXTRAS_LIB_DIR}"
          mkdir -p _work
          printf '%s\n' "${EXTRAS_LIB_DIR}" > _work/extras_lib_dir.txt

      - name: Rebase CTest paths to runner workspace
        run: |
          EXTRAS_LIB_DIR="$(cat _work/extras_lib_dir.txt)"
          TESTS_ROOT="${EXTRAS_LIB_DIR}/tests"
          TUTORIALS_ROOT="${EXTRAS_LIB_DIR}/tutorials"
          mapfile -t CTEST_FILES < <(find "${EXTRAS_LIB_DIR}" -type f -name CTestTestfile.cmake | sort)
          if [[ "${#CTEST_FILES[@]}" -eq 0 ]]; then
            echo "No CTestTestfile.cmake files found under ${EXTRAS_LIB_DIR}." >&2
            exit 1
          fi
          for f in "${CTEST_FILES[@]}"; do
            sed -E -i \
              -e "s|/[^\"[:space:]]*/build/tests/|${TESTS_ROOT}/|g" \
              -e "s|/[^\"[:space:]]*/build/tutorials/|${TUTORIALS_ROOT}/|g" \
              "${f}"
          done
          if rg -n '/build/tests/|/build/tutorials/' "${CTEST_FILES[@]}" >/dev/null; then
            echo "Unresolved build-tree paths after CTest rebasing:" >&2
            rg -n '/build/tests/|/build/tutorials/' "${CTEST_FILES[@]}" >&2 || true
            echo "CTEST path rebasing incomplete; stale absolute paths remain." >&2
            exit 1
          fi

      - name: Fix devkit runtime
        env:
          DEVKIT_PASSWORD: ${{ secrets.DEVKIT_PASSWORD }}
        run: |
          ./scripts/fix_devkit_runtime.sh

      - name: Discover installed CTest directories
        run: |
          EXTRAS_LIB_DIR="$(cat _work/extras_lib_dir.txt)"
          if [[ ! -d "${EXTRAS_LIB_DIR}" ]]; then
            echo "${EXTRAS_LIB_DIR} not found after sima-cli installation." >&2
            exit 1
          fi
          mapfile -t CTEST_DIRS < <(find "${EXTRAS_LIB_DIR}" -type f -name CTestTestfile.cmake -printf '%h\n' | sort -u)
          if [[ "${#CTEST_DIRS[@]}" -eq 0 ]]; then
            echo "No CTestTestfile.cmake found under ${EXTRAS_LIB_DIR}." >&2
            exit 1
          fi
          printf '%s\n' "${CTEST_DIRS[@]}" | sed 's|^|Detected CTest dir: |'
          printf '%s\n' "${CTEST_DIRS[@]}" > _work/ctest_dirs.txt

      - name: Run Unit & Integration Tests (Strict)
        run: |
          TEST_DIR="$(cat _work/extras_lib_dir.txt)/tests"
          ctest --test-dir "${TEST_DIR}" \
            --label-regex "strict" \
            --label-exclude "long" \
            --output-on-failure \
            --no-tests=error

      - name: Manifest Strict Fallback Gate
        env:
          SIMA_STRICT_MANIFEST_NO_JSON_FALLBACK: 1
        run: |
          TEST_DIR="$(cat _work/extras_lib_dir.txt)/tests"
          ctest --test-dir "${TEST_DIR}" \
            --output-on-failure \
            -R "^(unit_sima_plugin_manifest_strict_model_pipeline_test|unit_sima_plugin_manifest_strict_fallback_test)$"

      - name: Run Tutorial Tests
        continue-on-error: true
        run: |
          TUTORIALS_DIR="$(cat _work/extras_lib_dir.txt)/tutorials"
          ctest --test-dir "${TUTORIALS_DIR}" --output-on-failure

  docs:
    runs-on: [self-hosted, Linux, X64]
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          ./build.sh --install-deps-only

      - name: Configure docs build
        run: |
          cmake -S . -B build

      - name: Build docs
        env:
          DOCS_URL: https://ps.modalix.info
          DOCS_BASE_URL: /
        run: |
          echo
          echo "Building docs..."
          ./build.sh --doc

  publish-latest:
    runs-on: [self-hosted, Linux, ARM64, modalix]
    needs: docs
    env:
      CLOUDFRONT_DISTRIBUTION_ID: E3OR0YOA43MQ7D

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update latest.tag for branch
        run: |
          BRANCH_RAW="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          BRANCH_KEY="$(echo "${BRANCH_RAW}" | tr '/ ' '--')"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          mkdir -p _work/index
          printf '%s\n' "${SHORT_SHA}" > _work/index/latest.tag
          aws s3 cp _work/index/latest.tag "s3://sima-neat-artifacts/neat/${BRANCH_KEY}/latest.tag"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Refresh branches.json
        run: |
          mkdir -p _work/index
          aws s3api list-objects-v2 \
            --bucket sima-neat-artifacts \
            --prefix neat/ \
            --delimiter '/' \
            > _work/index/prefixes.json

          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("_work/index/prefixes.json").read_text(encoding="utf-8"))
          branches = []
          for item in data.get("CommonPrefixes", []):
            prefix = str(item.get("Prefix", ""))
            if not prefix.startswith("neat/"):
              continue
            branch = prefix[len("neat/"):].strip("/")
            if branch:
              branches.append(branch)

          payload = {"branches": sorted(set(branches))}
          Path("_work/index/branches.json").write_text(
            json.dumps(payload, indent=2) + "\n",
            encoding="utf-8",
          )
          print(json.dumps(payload, indent=2))
          PY

          aws s3 cp _work/index/branches.json \
            s3://sima-neat-artifacts/neat/branches.json \
            --content-type application/json

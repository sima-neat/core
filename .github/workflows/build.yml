name: Standard Build & Archive

on:
  push:
    branches:
      - "**"
  workflow_dispatch: {}

jobs:
  format-hygiene:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install formatting/lint tools
        run: |
          ./build.sh --install-deps-only

      - name: Check internal header hygiene
        run: |
          ./scripts/check_internal_headers.sh

      - name: Check C/C++ formatting (changed files)
        run: |
          ./scripts/check_format.sh --changed-only

      - name: Check CMake style (changed files)
        run: |
          ./scripts/check_cmake_format.sh --changed-only

      - name: Check duplicate includes (changed files)
        run: |
          ./scripts/check_duplicate_includes.sh --changed-only

  clang-tidy:
    runs-on: [self-hosted, Linux, X64]
    needs: format-hygiene

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-tidy
        run: |
          if command -v clang-tidy >/dev/null 2>&1 && command -v rg >/dev/null 2>&1; then
            echo "clang-tidy and ripgrep already installed."
            exit 0
          fi

          if [ "$(id -u)" -eq 0 ]; then
            apt-get update
            apt-get install -y clang-tidy ripgrep
            exit 0
          fi

          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo -n apt-get update
            sudo -n apt-get install -y clang-tidy ripgrep
            exit 0
          fi

          echo "Missing clang-tidy or ripgrep, and cannot install without passwordless sudo on this runner." >&2
          echo "Preinstall these packages on the x86 runner or enable passwordless sudo for the runner user." >&2
          exit 1

      - name: Install build dependencies
        run: |
          ./build.sh --install-deps-only

      - name: Run clang-tidy
        env:
          SIMANEAT_STRICT_WARNINGS: "ON"
        run: |
          ./scripts/run_cpp_tidy.sh --changed-only

      - name: Finishing off
        run: |
          echo "clang-tidy already executed in scripts/run_cpp_tidy.sh"

  build:
    runs-on: [self-hosted, Linux, X64, elxr-sdk]
    needs: clang-tidy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          echo "Preparing build environment on private machine..."

      - name: Build Project
        env:
          SIMANEAT_STRICT_WARNINGS: "OFF"
        run: |
          ./build.sh --all --clean --no-doc

      - name: Verify build artifacts
        run: |
          ls -lh ./*.deb
          ls -lh ./*extras.tar.gz
          ls -lh dist/*.whl

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Compute S3 artifact prefixes
        id: s3-prefix
        run: |
          BRANCH_RAW="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          BRANCH_KEY="$(echo "${BRANCH_RAW}" | tr '/ ' '--')"
          echo "branch_key=${BRANCH_KEY}" >> "${GITHUB_OUTPUT}"
          echo "commit_prefix=s3://sima-neat-artifacts/neat/${BRANCH_KEY}/${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "latest_prefix=s3://sima-neat-artifacts/neat/${BRANCH_KEY}/latest" >> "${GITHUB_OUTPUT}"

      - name: Prepare artifact payload and metadata
        run: |
          CORE_DEB="$(ls -1 ./*-Linux-core.deb | head -n1)"
          EXTRAS_TAR="$(ls -1 ./*extras.tar.gz | head -n1)"
          WHEEL_PATH="$(ls -1 dist/*.whl | head -n1)"
          bash tools/prepare_s3_artifacts.sh \
            --core-deb "${CORE_DEB}" \
            --extras-tar "${EXTRAS_TAR}" \
            --wheel "${WHEEL_PATH}" \
            --internals-manifest neat-internals/manifest.json \
            --output-dir "${GITHUB_WORKSPACE}/_work/upload-artifacts"

      - name: Upload artifacts to S3
        run: |
          for f in "${GITHUB_WORKSPACE}"/_work/upload-artifacts/*; do
            aws s3 cp "${f}" "${{ steps.s3-prefix.outputs.commit_prefix }}/"
          done

  test:
    runs-on: [self-hosted, Linux, ARM64, modalix]
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download test artifacts from S3
        run: |
          BRANCH_RAW="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          BRANCH_KEY="$(echo "${BRANCH_RAW}" | tr '/ ' '--')"
          ARTIFACT_PREFIX="s3://sima-neat-artifacts/neat/${BRANCH_KEY}/${GITHUB_SHA}"
          mkdir -p _work/artifacts
          aws s3 cp "${ARTIFACT_PREFIX}/" _work/artifacts/ --recursive \
            --exclude "*" \
            --include "*-Linux-core.deb" \
            --include "*extras.tar.gz" \
            --include "sima-neat-internals-*.tar.gz" \
            --include "*.whl"
          ls -lh _work/artifacts
          mapfile -t DEBS < <(find _work/artifacts -maxdepth 1 -type f -name '*-Linux-core.deb' | sort)
          mapfile -t EXTRAS_TARS < <(find _work/artifacts -maxdepth 1 -type f -name '*extras.tar.gz' | sort)
          mapfile -t INTERNALS_TARS < <(find _work/artifacts -maxdepth 1 -type f -name 'sima-neat-internals-*.tar.gz' | sort)
          mapfile -t WHLS < <(find _work/artifacts -maxdepth 1 -type f -name '*.whl' | sort)
          if [[ "${#DEBS[@]}" -lt 1 ]]; then
            echo "Expected at least 1 .deb file in _work/artifacts, found ${#DEBS[@]}." >&2
            exit 1
          fi
          if [[ "${#EXTRAS_TARS[@]}" -lt 1 ]]; then
            echo "Expected at least 1 extras tarball in _work/artifacts, found ${#EXTRAS_TARS[@]}." >&2
            exit 1
          fi
          if [[ "${#INTERNALS_TARS[@]}" -lt 1 ]]; then
            echo "Expected at least 1 neat-internals tarball in _work/artifacts, found ${#INTERNALS_TARS[@]}." >&2
            exit 1
          fi
          if [[ "${#WHLS[@]}" -lt 1 ]]; then
            echo "Expected at least 1 .whl file in _work/artifacts, found ${#WHLS[@]}." >&2
            exit 1
          fi

      - name: Install neat-internals DEBs for test runtime
        env:
          DEVKIT_PASSWORD: ${{ secrets.DEVKIT_PASSWORD }}
        run: |
          mapfile -t INTERNALS_TARS < <(find _work/artifacts -maxdepth 1 -type f -name 'sima-neat-internals-*.tar.gz' | sort)
          if [[ "${#INTERNALS_TARS[@]}" -lt 1 ]]; then
            echo "Expected at least 1 neat-internals tarball, found ${#INTERNALS_TARS[@]}." >&2
            exit 1
          fi
          INTERNALS_ROOT="${GITHUB_WORKSPACE}/_work/neat-internals"
          rm -rf "${INTERNALS_ROOT}"
          mkdir -p "${INTERNALS_ROOT}"
          tar -xzf "${INTERNALS_TARS[0]}" -C "${INTERNALS_ROOT}"
          mapfile -t INTERNALS_DEBS < <(find "${INTERNALS_ROOT}" -type f -name '*.deb' | sort)
          if [[ "${#INTERNALS_DEBS[@]}" -lt 1 ]]; then
            echo "No neat-internals .deb files found after extract." >&2
            exit 1
          fi
          for i in "${!INTERNALS_DEBS[@]}"; do
            INTERNALS_DEBS[$i]="$(realpath "${INTERNALS_DEBS[$i]}")"
          done
          if [[ -z "${DEVKIT_PASSWORD:-}" ]]; then
            echo "DEVKIT_PASSWORD is not set." >&2
            exit 1
          fi
          printf '%s\n' "${DEVKIT_PASSWORD}" | sudo -S apt install -y --allow-downgrades "${INTERNALS_DEBS[@]}"

      - name: Install DEB packages for test runtime
        env:
          DEVKIT_PASSWORD: ${{ secrets.DEVKIT_PASSWORD }}
        run: |
          mapfile -t DEBS < <(find _work/artifacts -maxdepth 1 -type f -name '*-Linux-core.deb' | sort)
          if [[ "${#DEBS[@]}" -lt 1 ]]; then
            echo "Expected at least 1 .deb file, found ${#DEBS[@]}." >&2
            exit 1
          fi
          for i in "${!DEBS[@]}"; do
            DEBS[$i]="$(realpath "${DEBS[$i]}")"
          done
          if [[ -z "${DEVKIT_PASSWORD:-}" ]]; then
            echo "DEVKIT_PASSWORD is not set." >&2
            exit 1
          fi
          printf '%s\n' "${DEVKIT_PASSWORD}" | sudo -S apt install -y --allow-downgrades "${DEBS[@]}"

      - name: Extract extras tarball for test runtime
        run: |
          mapfile -t EXTRAS_TARS < <(find _work/artifacts -maxdepth 1 -type f -name '*extras.tar.gz' | sort)
          if [[ "${#EXTRAS_TARS[@]}" -lt 1 ]]; then
            echo "Expected at least 1 extras tarball, found ${#EXTRAS_TARS[@]}." >&2
            exit 1
          fi
          EXTRAS_TAR="$(realpath "${EXTRAS_TARS[0]}")"
          EXTRAS_ROOT="${GITHUB_WORKSPACE}/_work/extras"
          rm -rf "${EXTRAS_ROOT}"
          mkdir -p "${EXTRAS_ROOT}"
          tar -xzf "${EXTRAS_TAR}" -C "${EXTRAS_ROOT}"

      - name: Rebase CTest paths to runner workspace
        run: |
          EXTRAS_ROOT="${GITHUB_WORKSPACE}/_work/extras"
          TESTS_ROOT="${EXTRAS_ROOT}/lib/sima-neat/tests"
          TUTORIALS_ROOT="${EXTRAS_ROOT}/lib/sima-neat/tutorials"
          mapfile -t CTEST_FILES < <(find "${EXTRAS_ROOT}/lib/sima-neat" -type f -name CTestTestfile.cmake | sort)
          if [[ "${#CTEST_FILES[@]}" -eq 0 ]]; then
            echo "No CTestTestfile.cmake files found under ${EXTRAS_ROOT}/lib/sima-neat." >&2
            exit 1
          fi
          for f in "${CTEST_FILES[@]}"; do
            sed -E -i \
              -e "s|/[^\"[:space:]]*/build/tests/|${TESTS_ROOT}/|g" \
              -e "s|/[^\"[:space:]]*/build/tutorials/|${TUTORIALS_ROOT}/|g" \
              "${f}"
          done
          if rg -n '/build/tests/|/build/tutorials/' "${CTEST_FILES[@]}" >/dev/null; then
            echo "Unresolved build-tree paths after CTest rebasing:" >&2
            rg -n '/build/tests/|/build/tutorials/' "${CTEST_FILES[@]}" >&2 || true
            echo "CTEST path rebasing incomplete; stale absolute paths remain." >&2
            exit 1
          fi

      - name: Setup test venv and install pyneat wheel
        run: |
          VENV_DIR="${GITHUB_WORKSPACE}/_work/pyneat-venv"
          rm -rf "${VENV_DIR}"
          python3 -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip
          mapfile -t WHLS < <(find _work/artifacts -maxdepth 1 -type f -name '*.whl' | sort)
          if [[ "${#WHLS[@]}" -lt 1 ]]; then
            echo "No .whl files found in _work/artifacts." >&2
            exit 1
          fi
          WHEEL_PATH="$(realpath "${WHLS[0]}")"
          "${VENV_DIR}/bin/python" -m pip install --force-reinstall --no-deps "${WHEEL_PATH}"
          "${VENV_DIR}/bin/python" -c "import pyneat; print(pyneat.__file__)"

      - name: Fix devkit runtime
        env:
          DEVKIT_PASSWORD: ${{ secrets.DEVKIT_PASSWORD }}
        run: |
          ./scripts/fix_devkit_runtime.sh

      - name: Discover installed CTest directories
        run: |
          EXTRAS_LIB_DIR="${GITHUB_WORKSPACE}/_work/extras/lib/sima-neat"
          if [[ ! -d "${EXTRAS_LIB_DIR}" ]]; then
            echo "${EXTRAS_LIB_DIR} not found after extras extraction." >&2
            exit 1
          fi
          mapfile -t CTEST_DIRS < <(find "${EXTRAS_LIB_DIR}" -type f -name CTestTestfile.cmake -printf '%h\n' | sort -u)
          if [[ "${#CTEST_DIRS[@]}" -eq 0 ]]; then
            echo "No CTestTestfile.cmake found under ${EXTRAS_LIB_DIR}." >&2
            exit 1
          fi
          printf '%s\n' "${CTEST_DIRS[@]}" | sed 's|^|Detected CTest dir: |'
          printf '%s\n' "${CTEST_DIRS[@]}" > _work/ctest_dirs.txt

      - name: Run Unit & Integration Tests (Strict)
        env:
          SIMA_YOLO_IMAGE: tests/images/people.jpg
        run: |
          TEST_DIR="${GITHUB_WORKSPACE}/_work/extras/lib/sima-neat/tests"
          ctest --test-dir "${TEST_DIR}" \
            --label-regex "strict" \
            --label-exclude "long" \
            --output-on-failure \
            --no-tests=error

      - name: Manifest Strict Fallback Gate
        env:
          SIMA_STRICT_MANIFEST_NO_JSON_FALLBACK: 1
        run: |
          TEST_DIR="${GITHUB_WORKSPACE}/_work/extras/lib/sima-neat/tests"
          ctest --test-dir "${TEST_DIR}" \
            --output-on-failure \
            -R "^(unit_sima_plugin_manifest_strict_model_pipeline_test|unit_sima_plugin_manifest_strict_fallback_test)$"

      - name: Run Tutorial Tests
        continue-on-error: true
        run: |
          TUTORIALS_DIR="${GITHUB_WORKSPACE}/_work/extras/lib/sima-neat/tutorials"
          ctest --test-dir "${TUTORIALS_DIR}" --output-on-failure

  docs:
    runs-on: [self-hosted, Linux, X64]
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          ./build.sh --install-deps-only

      - name: Configure docs build
        run: |
          cmake -S . -B build

      - name: Build docs
        env:
          DOCS_URL: https://ps.modalix.info
          DOCS_BASE_URL: /
        run: |
          echo
          echo "Building docs..."
          ./build.sh --doc

  publish-latest:
    runs-on: [self-hosted, Linux, ARM64, modalix]
    needs: docs

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download artifacts from commit prefix
        run: |
          BRANCH_RAW="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          BRANCH_KEY="$(echo "${BRANCH_RAW}" | tr '/ ' '--')"
          ARTIFACT_PREFIX="s3://sima-neat-artifacts/neat/${BRANCH_KEY}/${GITHUB_SHA}"
          mkdir -p _work/artifacts
          aws s3 cp "${ARTIFACT_PREFIX}/" _work/artifacts/ --recursive \
            --exclude "*" \
            --include "*-Linux-core.deb" \
            --include "*extras.tar.gz" \
            --include "*.whl"

      - name: Publish latest bundle to S3
        run: |
          BRANCH_RAW="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          BRANCH_KEY="$(echo "${BRANCH_RAW}" | tr '/ ' '--')"
          BRANCH_LABEL="$(echo "${BRANCH_RAW}" | tr '/ +@' '----')"
          LATEST_PREFIX="s3://sima-neat-artifacts/neat/${BRANCH_KEY}/latest"

          mapfile -t CORE_DEBS < <(find _work/artifacts -maxdepth 1 -type f -name '*-Linux-core.deb' | sort)
          mapfile -t EXTRAS_TARS < <(find _work/artifacts -maxdepth 1 -type f -name '*extras.tar.gz' | sort)
          mapfile -t WHLS < <(find _work/artifacts -maxdepth 1 -type f -name '*.whl' | sort)
          if [[ "${#CORE_DEBS[@]}" -lt 1 || "${#EXTRAS_TARS[@]}" -lt 1 || "${#WHLS[@]}" -lt 1 ]]; then
            echo "Missing required artifacts for latest bundle publish." >&2
            exit 1
          fi

          CORE_DEB="$(realpath "${CORE_DEBS[0]}")"
          EXTRAS_TAR="$(realpath "${EXTRAS_TARS[0]}")"
          WHEEL_PATH="$(realpath "${WHLS[0]}")"

          CORE_BASE="$(basename "${CORE_DEB}")"
          VERSION_RAW="0.0.0"
          if [[ "${CORE_BASE}" =~ ^sima-neat-(.+)-Linux-core\.deb$ ]]; then
            VERSION_RAW="${BASH_REMATCH[1]}"
          fi
          VERSION_BASE="${VERSION_RAW%%+*}"

          BUNDLE_DIR="${GITHUB_WORKSPACE}/_work/latest-bundle"
          mkdir -p "${BUNDLE_DIR}"
          BUNDLE_NAME="sima-neat-${VERSION_BASE}-${BRANCH_LABEL}-latest.tar.gz"
          BUNDLE_PATH="${BUNDLE_DIR}/${BUNDLE_NAME}"
          MANIFEST_PATH="${GITHUB_WORKSPACE}/_work/artifacts/latest-manifest.json"

          cat > "${MANIFEST_PATH}" <<EOF
          {
            "branch": "${BRANCH_RAW}",
            "branch_key": "${BRANCH_KEY}",
            "commit": "${GITHUB_SHA}",
            "core_deb": "$(basename "${CORE_DEB}")",
            "extras_tar": "$(basename "${EXTRAS_TAR}")",
            "wheel": "$(basename "${WHEEL_PATH}")"
          }
          EOF

          tar -C _work/artifacts -czf "${BUNDLE_PATH}" \
            "$(basename "${CORE_DEB}")" \
            "$(basename "${EXTRAS_TAR}")" \
            "$(basename "${WHEEL_PATH}")" \
            "$(basename "${MANIFEST_PATH}")"

          aws s3 rm "${LATEST_PREFIX}/" --recursive
          aws s3 cp "${BUNDLE_PATH}" "${LATEST_PREFIX}/${BUNDLE_NAME}"

      - name: Print latest manifest
        run: |
          MANIFEST_PATH="${GITHUB_WORKSPACE}/_work/artifacts/latest-manifest.json"
          if [[ ! -f "${MANIFEST_PATH}" ]]; then
            echo "Manifest file not found: ${MANIFEST_PATH}" >&2
            exit 1
          fi
          cat "${MANIFEST_PATH}"

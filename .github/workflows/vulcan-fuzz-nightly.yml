name: Vulcan Fuzz Nightly

run-name: Vulcan fuzz nightly (${{ vars.VULCAN_ENV || 'staging' }})

on:
  schedule:
    - cron: "30 2 * * *"
  push:
    branches:
      - "release/**"
      - "feature/nightly"
    tags:
      - "v*-rc*"
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read
  id-token: write
  packages: read

jobs:
  resolve-vulcan-config:
    name: Resolve Vulcan Config
    uses: sima-neat/.github/.github/workflows/vulcan-resolve-config.yml@main
    with:
      vulcan_env: ${{ vars.VULCAN_ENV || 'staging' }}

  build-fuzz-artifacts:
    if: github.event_name != 'push' || github.ref_name == 'feature/nightly' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/vulcan-ci.yml
    with:
      build_mode: fuzz
    secrets: inherit

  run-fuzz:
    name: run-fuzz
    runs-on: [self-hosted, Linux, ARM64, modalix, "vulcan-${{ needs.resolve-vulcan-config.outputs.vulcan_env }}"]
    if: github.event_name != 'push' || github.ref_name == 'feature/nightly' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')
    needs:
      - resolve-vulcan-config
      - build-fuzz-artifacts
    env:
      VULCAN_ENV: ${{ needs.resolve-vulcan-config.outputs.vulcan_env }}
      VULCAN_ARTIFACT_BASE_URL: ${{ needs.resolve-vulcan-config.outputs.artifact_base_url }}
      SIMA_CLI_CHECK_FOR_UPDATE: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean workspace
        run: |
          rm -rf _work
          mkdir -p _work
          rm -f ./*-Linux-core.deb ./*extras.tar.gz ./*.whl ./neat-*.deb ./simaai-common*.deb ./appcomplex_*.deb ./sima-lmm-*.deb ./metadata*.json ./install_neat_framework.sh ./neat-install-manifest.txt || true
          find . -maxdepth 1 -type d -name 'sima-neat-*-Linux-extras' -exec rm -rf {} +

      - name: Install fuzz runtime from metadata-all
        run: |
          if command -v sima-cli >/dev/null 2>&1; then
            SIMA_CLI_BIN="$(command -v sima-cli)"
          elif [[ -x /mnt/vulcan/bin/sima-cli ]]; then
            SIMA_CLI_BIN=/mnt/vulcan/bin/sima-cli
          else
            echo "sima-cli not found on fuzz runner." >&2
            exit 1
          fi
          if [[ -z "${VULCAN_ARTIFACT_BASE_URL:-}" ]]; then
            echo "VULCAN_ARTIFACT_BASE_URL is not set." >&2
            exit 1
          fi
          "${SIMA_CLI_BIN}" neat install --help >/dev/null

          REF_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          BRANCH_KEY="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "${REF_NAME}")"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          METADATA_URL="${VULCAN_ARTIFACT_BASE_URL%/}/core/${BRANCH_KEY}/${SHORT_SHA}/core-fuzz/metadata-all.json"
          echo "Installing from ${METADATA_URL}"
          curl -fsSL "${METADATA_URL}" -o _work/fuzz-metadata-all.json
          python3 -m json.tool _work/fuzz-metadata-all.json >/dev/null
          "${SIMA_CLI_BIN}" neat install -m "${METADATA_URL}"

      - name: Locate installed extras content
        run: |
          mapfile -t CTEST_FILES < <(find "${GITHUB_WORKSPACE}" -type f -path '*/lib/sima-neat/tests/CTestTestfile.cmake' -printf '%T@ %p\n' 2>/dev/null | sort -nr | awk '{print $2}')
          if [[ "${#CTEST_FILES[@]}" -eq 0 ]]; then
            echo "Unable to locate installed extras tests under GITHUB_WORKSPACE after sima-cli install." >&2
            exit 1
          fi
          EXTRAS_LIB_DIR="$(dirname "$(dirname "${CTEST_FILES[0]}")")"
          echo "Using extras lib dir: ${EXTRAS_LIB_DIR}"
          printf '%s\n' "${EXTRAS_LIB_DIR}" > _work/extras_lib_dir.txt

      - name: Verify prebuilt fuzz binaries exist
        run: |
          FUZZ_BIN_DIR="$(cat _work/extras_lib_dir.txt)/tests/fuzz"
          missing=0
          for target in fuzz_modelpack_json fuzz_pipeline_sequence fuzz_gst_pipeline_string; do
            if [[ ! -x "${FUZZ_BIN_DIR}/${target}" ]]; then
              echo "Missing prebuilt fuzz binary: ${FUZZ_BIN_DIR}/${target}" >&2
              missing=1
            fi
          done
          if [[ "${missing}" -ne 0 ]]; then
            echo "Prebuilt fuzz binaries are required in extras payload." >&2
            exit 1
          fi

      - name: Fix devkit runtime
        env:
          DEVKIT_PASSWORD: ${{ secrets.DEVKIT_PASSWORD }}
        run: |
          ./scripts/fix_devkit_runtime.sh

      - name: Run fuzz nightly
        env:
          MAX_TOTAL_TIME: "60"
          FUZZ_PREBUILT_ONLY: "1"
        run: |
          EXTRAS_LIB_DIR="$(cat _work/extras_lib_dir.txt)"
          export FUZZ_BIN_DIR="${EXTRAS_LIB_DIR}/tests/fuzz"
          export CORPUS_ROOT="${GITHUB_WORKSPACE}/tests/fuzz/corpus"
          bash scripts/ci/run_fuzz_nightly.sh

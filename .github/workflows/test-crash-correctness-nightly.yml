name: Test Crash Correctness (NoM)

on:
  schedule:
    - cron: "45 4 * * *"
  workflow_dispatch:
    inputs:
      repeat_count:
        description: "Repeat count for crash-prone tests (until-fail)"
        required: false
        default: "20"
        type: string

jobs:
  crash-correctness-nightly:
    name: crash-correctness-gate
    runs-on: [self-hosted, Linux, ARM64, modalix]
    if: github.ref_name == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean test workspace
        run: |
          rm -rf _work
          mkdir -p _work
          rm -f ./*-Linux-core.deb ./*extras.tar.gz ./*.whl ./neat-*.deb ./metadata*.json ./install_neat_framework.sh || true
          find . -maxdepth 1 -type d -name 'sima-neat-*-Linux-extras' -exec rm -rf {} +

      - name: Install runtime from latest main metadata-all
        run: |
          if ! command -v sima-cli >/dev/null 2>&1; then
            echo "sima-cli not found on runner." >&2
            exit 1
          fi
          TAG="$(curl -fsSL https://neat-artifacts.modalix.info/neat/main/latest.tag | tr -d '[:space:]')"
          if [[ -z "${TAG}" ]]; then
            echo "Failed to resolve latest.tag for main branch." >&2
            exit 1
          fi
          METADATA_URL="https://neat-artifacts.modalix.info/neat/main/${TAG}/metadata-all.json"
          echo "Installing from ${METADATA_URL}"
          sima-cli install -m "${METADATA_URL}"

      - name: Locate installed tests
        run: |
          mapfile -t CTEST_FILES < <(find /media/nvme "${HOME}" -type f -path '*/lib/sima-neat/tests/CTestTestfile.cmake' -printf '%T@ %p\n' 2>/dev/null | sort -nr | awk '{print $2}')
          if [[ "${#CTEST_FILES[@]}" -eq 0 ]]; then
            echo "Unable to locate installed extras tests after sima-cli install." >&2
            exit 1
          fi
          EXTRAS_LIB_DIR="$(dirname "$(dirname "${CTEST_FILES[0]}")")"
          TEST_DIR="${EXTRAS_LIB_DIR}/tests"
          if [[ ! -d "${TEST_DIR}" ]]; then
            echo "Test directory not found: ${TEST_DIR}" >&2
            exit 1
          fi
          echo "Using test directory: ${TEST_DIR}"
          printf '%s\n' "${TEST_DIR}" > _work/test_dir.txt

      - name: Rebase CTest paths to runner workspace
        run: |
          TEST_DIR="$(cat _work/test_dir.txt)"
          TUTORIALS_ROOT="$(dirname "${TEST_DIR}")/tutorials"
          mapfile -t CTEST_FILES < <(find "${TEST_DIR}" -type f -name CTestTestfile.cmake | sort)
          if [[ "${#CTEST_FILES[@]}" -eq 0 ]]; then
            echo "No CTestTestfile.cmake files found under ${TEST_DIR}." >&2
            exit 1
          fi
          for f in "${CTEST_FILES[@]}"; do
            sed -E -i \
              -e "s|/[^\"[:space:]]*/build/tests/|${TEST_DIR}/|g" \
              -e "s|/[^\"[:space:]]*/build/tutorials/|${TUTORIALS_ROOT}/|g" \
              "${f}"
          done
          if rg -n '/build/tests/|/build/tutorials/' "${CTEST_FILES[@]}" >/dev/null; then
            echo "Unresolved build-tree paths after CTest rebasing." >&2
            rg -n '/build/tests/|/build/tutorials/' "${CTEST_FILES[@]}" >&2 || true
            exit 1
          fi

      - name: Fix devkit runtime
        env:
          DEVKIT_PASSWORD: ${{ secrets.DEVKIT_PASSWORD }}
        run: |
          ./scripts/fix_devkit_runtime.sh

      - name: Run Modalix preflight
        run: |
          TEST_DIR="$(cat _work/test_dir.txt)"
          ctest --test-dir "${TEST_DIR}" -R "^unit_modalix_contract_preflight_test$" --output-on-failure --no-tests=error

      - name: Run critical crash/correctness suite
        run: |
          TEST_DIR="$(cat _work/test_dir.txt)"
          CRITICAL_REGEX='^(unit_builder_test|unit_caps_bridge_test|unit_graph_compiler_topology_test|unit_graph_compiler_spec_validation_test|unit_graph_join_bundle_test|unit_graph_join_encoded_with_meta_test|unit_graph_stamp_frame_id_test|unit_graph_strict_sync_store_test|unit_contracts_test|unit_detection_types_bbox_test|unit_gst_data_adapter_edge_test|unit_group_optiview_output_group_failure_test|unit_nodes_test|unit_node_optiview_json_output_test|unit_outputspec_test|unit_pipeline_build_wiring_test|unit_pipeline_internal_build_test|unit_run_holder_api_test|unit_model_infer_output_name_test|unit_model_input_spec_contract_test|unit_model_output_spec_contract_test|unit_model_metadata_test|unit_model_stage_fragments_test|unit_run_pull_variants_api_test|unit_run_try_push_api_test|unit_run_api_variants_test|unit_session_io_roundtrip_test|unit_session_io_negative_test|unit_session_naming_transform_test|unit_simaai_guard_test|unit_stageconfig_mla_info_test|unit_tensor_conversion_policy_test|unit_tensor_image_mapping_test|output_appsink_policy_test|async_stream_test|hybrid_graph_basic_test|hybrid_graph_fanout_test|graph_deterministic_routing_regression_test|caps_negotiation_matrix_regression_test|gst_data_adapter_runtime_regression_test|pull_timeout_regression_test|session_naming_pipeline_integration_test|session_rtsp_lifecycle_regression_test|session_validate_report_regression_test|stage_routing_regression_test)$'
          ctest --test-dir "${TEST_DIR}" --output-on-failure -R "${CRITICAL_REGEX}"

      - name: Repeat crash-prone regression tests until fail
        run: |
          TEST_DIR="$(cat _work/test_dir.txt)"
          REPEAT_COUNT="${{ github.event.inputs.repeat_count || '20' }}"
          if [[ ! "${REPEAT_COUNT}" =~ ^[0-9]+$ ]] || [[ "${REPEAT_COUNT}" -lt 1 ]]; then
            echo "Invalid repeat_count: ${REPEAT_COUNT}" >&2
            exit 1
          fi
          if [[ "${REPEAT_COUNT}" -le 1 ]]; then
            echo "repeat_count=${REPEAT_COUNT}; skipping until-fail loop."
            exit 0
          fi
          REPEAT_REGEX='^(async_stream_test|hybrid_graph_basic_test|graph_deterministic_routing_regression_test|caps_negotiation_matrix_regression_test|gst_data_adapter_runtime_regression_test|pull_timeout_regression_test|unit_run_try_push_api_test|unit_run_holder_api_test|unit_run_pull_variants_api_test|unit_model_infer_output_name_test|unit_model_input_spec_contract_test|unit_model_output_spec_contract_test|unit_run_api_variants_test|session_naming_pipeline_integration_test|session_rtsp_lifecycle_regression_test|session_validate_report_regression_test|stage_routing_regression_test)$'
          ctest --test-dir "${TEST_DIR}" --output-on-failure --repeat "until-fail:${REPEAT_COUNT}" -R "${REPEAT_REGEX}"

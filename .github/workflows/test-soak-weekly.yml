name: Soak Weekly

on:
  schedule:
    - cron: "10 4 * * 2"
  workflow_dispatch: {}

jobs:
  soak-weekly:
    name: soak-weekly
    runs-on: [self-hosted, Linux, ARM64, modalix]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install soak dependencies
        run: ./build.sh --install-deps-only

      - name: Install runtime from latest main metadata-all
        run: |
          if ! command -v sima-cli >/dev/null 2>&1; then
            echo "sima-cli not found on runner." >&2
            exit 1
          fi
          TAG="$(curl -fsSL https://sima-neat.com/core/main/latest.tag | tr -d '[:space:]')"
          if [[ -z "${TAG}" ]]; then
            echo "Failed to resolve latest.tag for main branch." >&2
            exit 1
          fi
          METADATA_URL="https://sima-neat.com/core/main/${TAG}/metadata-all.json"
          echo "Installing from ${METADATA_URL}"
          sima-cli install -m "${METADATA_URL}"

      - name: Locate installed tests
        run: |
          mapfile -t CTEST_FILES < <(find "${GITHUB_WORKSPACE}" -type f -path '*/lib/sima-neat/tests/CTestTestfile.cmake' -printf '%T@ %p\n' 2>/dev/null | sort -nr | awk '{print $2}')
          if [[ "${#CTEST_FILES[@]}" -eq 0 ]]; then
            echo "Unable to locate installed extras tests under GITHUB_WORKSPACE after sima-cli install." >&2
            exit 1
          fi
          EXTRAS_LIB_DIR="$(dirname "$(dirname "${CTEST_FILES[0]}")")"
          TEST_DIR="${EXTRAS_LIB_DIR}/tests"
          TUTORIALS_ROOT="${EXTRAS_LIB_DIR}/tutorials"
          if [[ ! -d "${TEST_DIR}" ]]; then
            echo "Test directory not found: ${TEST_DIR}" >&2
            exit 1
          fi

          mapfile -t REBASE_FILES < <(find "${EXTRAS_LIB_DIR}" -type f -name CTestTestfile.cmake | sort)
          if [[ "${#REBASE_FILES[@]}" -eq 0 ]]; then
            echo "No CTestTestfile.cmake files found under ${EXTRAS_LIB_DIR}." >&2
            exit 1
          fi
          for f in "${REBASE_FILES[@]}"; do
            sed -E -i \
              -e "s|/[^\"[:space:]]*/build/tests/|${TEST_DIR}/|g" \
              -e "s|/[^\"[:space:]]*/build/tutorials/|${TUTORIALS_ROOT}/|g" \
              "${f}"
          done
          if rg -n '/build/tests/|/build/tutorials/' "${REBASE_FILES[@]}" >/dev/null; then
            echo "Unresolved build-tree paths after CTest rebasing." >&2
            rg -n '/build/tests/|/build/tutorials/' "${REBASE_FILES[@]}" >&2 || true
            exit 1
          fi

          mkdir -p _work
          printf '%s\n' "${TEST_DIR}" > _work/test_dir.txt

      - name: Fix devkit runtime
        env:
          DEVKIT_PASSWORD: ${{ secrets.DEVKIT_PASSWORD }}
        run: |
          ./scripts/fix_devkit_runtime.sh

      - name: Run soak lane
        run: |
          TEST_DIR="$(cat _work/test_dir.txt)"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            SIMA_STRESS_ITERS=100 SOAK_DURATION_HOURS=8 SOAK_INTERVAL_SECONDS=900 SOAK_SKIP_PREFLIGHT=1 SOAK_TEST_DIR="${TEST_DIR}" bash scripts/ci/run_soak_lane.sh
          else
            SIMA_STRESS_ITERS=60 SOAK_DURATION_HOURS=2 SOAK_INTERVAL_SECONDS=600 SOAK_SKIP_PREFLIGHT=1 SOAK_TEST_DIR="${TEST_DIR}" bash scripts/ci/run_soak_lane.sh
          fi

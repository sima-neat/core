name: Issue to Jira Sync

on:
  issues:
    types: [opened, edited, reopened, closed]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number (for manual test)"
        required: false
        default: "39"
        type: string
      issue_title:
        description: "GitHub issue title (for manual test)"
        required: false
        default: "Manual test: Jira sync"
        type: string
      issue_body:
        description: "GitHub issue body (for manual test)"
        required: false
        default: "Testing issue->Jira sync from workflow_dispatch"
        type: string
      issue_url:
        description: "GitHub issue URL override (optional)"
        required: false
        default: ""
        type: string
      action:
        description: "Simulated issue action"
        required: false
        default: opened
        type: choice
        options:
          - opened
          - edited
          - reopened
          - closed
      jira_key:
        description: "Existing Jira key override (optional, e.g. AUTO-123)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Print payloads only; do not call Jira or mutate GitHub issues"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  sync:
    uses: sima-neat/.github/.github/workflows/issues-jira-sync.yml@main
    secrets: inherit
    with:
      event_name: '${{ github.event_name }}'
      action: '${{ github.event_name == ''workflow_dispatch'' && inputs.action || github.event.action || ''opened'' }}'
      issue_number: '${{ github.event_name == ''workflow_dispatch'' && inputs.issue_number || github.event.issue.number || '''' }}'
      issue_title: '${{ github.event_name == ''workflow_dispatch'' && inputs.issue_title || github.event.issue.title || '''' }}'
      issue_body: '${{ github.event_name == ''workflow_dispatch'' && inputs.issue_body || github.event.issue.body || '''' }}'
      issue_url: '${{ github.event_name == ''workflow_dispatch'' && inputs.issue_url || github.event.issue.html_url || '''' }}'
      jira_key: '${{ github.event_name == ''workflow_dispatch'' && inputs.jira_key || '''' }}'
      assignees_json: '[]'
      comment_body: ''
      comment_url: ''
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      github_repository: '${{ github.repository }}'
      jira_project_key: '${{ vars.JIRA_PROJECT_KEY || ''AUTO'' }}'
      jira_issue_type_name: '${{ vars.JIRA_ISSUE_TYPE_NAME || ''Task'' }}'
      jira_epic_key: '${{ vars.JIRA_NEAT_CORE_EPIC_KEY || '''' }}'
      jira_epic_link_field_id: '${{ vars.JIRA_EPIC_LINK_FIELD_ID || '''' }}'
      jira_gh_user_map_json: '{}'
      jira_backlog_enforce: false
      enable_label_lookup: true
      enable_assignee_sync: false
      enable_comment_sync: false
      enable_epic_link: ${{ vars.JIRA_NEAT_CORE_EPIC_KEY != '' }}
      enable_backlog_move: false
      enable_issue_label_cleanup: true

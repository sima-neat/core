name: Sanitizer Nightly

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch: {}

jobs:
  build-sanitizers:
    name: build-${{ matrix.mode }}
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'main'
    runs-on: [self-hosted, Linux, X64, elxr-sdk]
    strategy:
      fail-fast: false
      matrix:
        mode: [asan-ubsan, tsan]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build sanitizer artifacts
        env:
          CC: clang
          CXX: clang++
          SIMANEAT_STRICT_WARNINGS: "OFF"
        run: |
          ./build.sh --all --clean --no-doc --${{ matrix.mode }}

      - name: Verify build artifacts
        run: |
          ls -lh dist/*.deb
          ls -lh dist/*extras.tar.gz
          ls -lh dist/*.whl
          ls -lh dist/metadata*.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Compute S3 sanitizer prefix
        id: s3-prefix
        run: |
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          MODE="${{ matrix.mode }}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "commit_prefix=s3://sima-neat-artifacts/neat/main/${SHORT_SHA}/${MODE}" >> "${GITHUB_OUTPUT}"

      - name: Prepare sanitizer artifact payload and metadata
        run: |
          RESOLVED_MANIFEST="build/resolved_manifest.json"
          if [[ ! -f "${RESOLVED_MANIFEST}" ]]; then
            echo "Missing resolved internals manifest: ${RESOLVED_MANIFEST}" >&2
            exit 1
          fi
          OUT_DIR="${GITHUB_WORKSPACE}/_work/upload-artifacts-${{ matrix.mode }}"
          bash tools/prepare_s3_artifacts.sh \
            --artifacts-dir dist \
            --output-dir "${OUT_DIR}"
          cp "${RESOLVED_MANIFEST}" "${OUT_DIR}/manifest.json"

      - name: Upload sanitizer artifacts to S3
        run: |
          OUT_DIR="${GITHUB_WORKSPACE}/_work/upload-artifacts-${{ matrix.mode }}"
          for f in "${OUT_DIR}"/*; do
            aws s3 cp "${f}" "${{ steps.s3-prefix.outputs.commit_prefix }}/"
          done

  test-sanitizers:
    name: test-sanitizers
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'main'
    runs-on: [self-hosted, Linux, ARM64, modalix, dvt-3]
    needs: build-sanitizers

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install sanitizer dependencies
        run: ./build.sh --install-deps-only

      - name: Run sanitizer gates from uploaded artifacts
        env:
          DEVKIT_PASSWORD: ${{ secrets.DEVKIT_PASSWORD }}
        run: |
          if ! command -v sima-cli >/dev/null 2>&1; then
            echo "sima-cli not found on runner." >&2
            exit 1
          fi

          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          mkdir -p _work

          for MODE in asan-ubsan tsan; do
            echo "[sanitizers] Installing ${MODE} artifacts..."
            METADATA_URL="https://artifacts.sima-neat.com/core/main/${SHORT_SHA}/${MODE}/metadata-all.json"
            echo "[sanitizers] Installing from ${METADATA_URL}"
            sima-cli install -m "${METADATA_URL}"

            mapfile -t CTEST_FILES < <(find "${GITHUB_WORKSPACE}" -type f -path '*/lib/sima-neat/tests/CTestTestfile.cmake' -printf '%T@ %p\n' 2>/dev/null | sort -nr | awk '{print $2}')
            if [[ "${#CTEST_FILES[@]}" -eq 0 ]]; then
              echo "Unable to locate installed extras tests under GITHUB_WORKSPACE after sima-cli install for ${MODE}." >&2
              exit 1
            fi

            EXTRAS_LIB_DIR="$(dirname "$(dirname "${CTEST_FILES[0]}")")"
            TEST_DIR="${EXTRAS_LIB_DIR}/tests"
            TUTORIALS_ROOT="${EXTRAS_LIB_DIR}/tutorials"
            if [[ ! -d "${TEST_DIR}" ]]; then
              echo "Test directory not found for ${MODE}: ${TEST_DIR}" >&2
              exit 1
            fi

            mapfile -t REBASE_FILES < <(find "${EXTRAS_LIB_DIR}" -type f -name CTestTestfile.cmake | sort)
            if [[ "${#REBASE_FILES[@]}" -eq 0 ]]; then
              echo "No CTestTestfile.cmake files found under ${EXTRAS_LIB_DIR}." >&2
              exit 1
            fi
            for f in "${REBASE_FILES[@]}"; do
              sed -E -i \
                -e "s|/[^\"[:space:]]*/build/tests/|${TEST_DIR}/|g" \
                -e "s|/[^\"[:space:]]*/build/tutorials/|${TUTORIALS_ROOT}/|g" \
                "${f}"
            done
            if rg -n '/build/tests/|/build/tutorials/' "${REBASE_FILES[@]}" >/dev/null; then
              echo "Unresolved build-tree paths after CTest rebasing for ${MODE}." >&2
              rg -n '/build/tests/|/build/tutorials/' "${REBASE_FILES[@]}" >&2 || true
              exit 1
            fi

            ./scripts/fix_devkit_runtime.sh

            SANITIZER_MODE="${MODE}" \
              bash scripts/ci/run_sanitizer_gate.sh --test-dir "${TEST_DIR}"
          done

name: Install Smoke

on:
  pull_request:
    branches: ["main"]
  push:
    branches:
      - "main"
      - "release/**"
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  install-smoke:
    name: install-smoke
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release/') }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: ./build.sh --install-deps-only

      - name: Run install smoke gate
        run: bash scripts/ci/run_install_smoke.sh

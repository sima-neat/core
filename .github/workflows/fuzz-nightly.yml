name: Fuzz Nightly

on:
  schedule:
    - cron: "30 4 * * *"
  push:
    branches:
      - "release/**"
    tags:
      - "v*-rc*"
  workflow_dispatch: {}

jobs:
  fuzz-nightly:
    name: fuzz-nightly
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: ./build.sh --install-deps-only

      - name: Install clang toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Run fuzz nightly
        env:
          CC: clang
          CXX: clang++
          MAX_TOTAL_TIME: "60"
        run: bash scripts/ci/run_fuzz_nightly.sh

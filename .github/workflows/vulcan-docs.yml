name: Vulcan Docs

run-name: vulcan-docs (${{ github.event_name == 'workflow_dispatch' && inputs.deploy_environment || 'stg' }})

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Vulcan docs environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - stg
          - prod

permissions:
  contents: read
  actions: write
  id-token: write

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.deploy_environment || 'stg' }}
  cancel-in-progress: false

jobs:
  resolve-target:
    name: Resolve Target
    runs-on: ubuntu-latest
    outputs:
      deploy_environment: ${{ steps.target.outputs.deploy_environment }}
    steps:
      - name: Resolve deployment target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            deploy_environment="${{ inputs.deploy_environment }}"
          else
            deploy_environment="stg"
          fi

          case "${deploy_environment}" in
            dev|stg)
              ;;
            prod)
              if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
                echo "Production docs deploy is only allowed from refs/heads/main. Current ref: ${GITHUB_REF}" >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported deployment environment: ${deploy_environment}" >&2
              exit 1
              ;;
          esac

          echo "deploy_environment=${deploy_environment}" >> "${GITHUB_OUTPUT}"

  build-docs:
    name: Build Docs
    needs: resolve-target
    uses: sima-neat/.github/.github/workflows/vulcan-build.yml@main
    with:
      vulcan_env: ${{ needs.resolve-target.outputs.deploy_environment }}
      sdk_cache: ${{ vars.VULCAN_SDK_CACHE || 'sdk-latest' }}
      capacity: ${{ vars.VULCAN_DOCS_CAPACITY || 'cheap' }}
      fetch_depth: 1
      checkout_submodules: false
      ensure_sdk_container: true
      sdk_setup_args: "-y -n --minimal --workspace /mnt/vulcan/workspace --no-model-sdk --no-insight"
      artifact_name: vulcan-docs-site
      artifact_path: website/build/*
      artifact_retention_days: 1
      build_command: |
        set -euo pipefail

        export DOCS_URL='${{ vars.VULCAN_DOCS_URL }}'
        export DOCS_GA_MEASUREMENT_ID='${{ vars.DOCS_GA_MEASUREMENT_ID }}'
        export DOCS_STRICT_LINKS=1
        export DOCS_BASE_URL=/

        if [[ -z "${DOCS_URL}" ]]; then
          echo "Missing VULCAN_DOCS_URL for environment ${{ needs.resolve-target.outputs.deploy_environment }}." >&2
          exit 1
        fi

        ./build.sh --doc

      post_build_command: |
        set -euo pipefail
        test -d website/build
        test -f website/build/index.html
        DOCS_LINK_SITE_DIR="${PWD}/website/build" DOCS_LINK_START_PATHS=all bash scripts/ci/check_docs_links.sh

  publish-docs:
    name: Publish Docs
    needs:
      - resolve-target
      - build-docs
    uses: sima-neat/.github/.github/workflows/vulcan-publish-static-site.yml@main
    with:
      environment_name: ${{ needs.resolve-target.outputs.deploy_environment }}
      site_key: DOCS
      artifact_pattern: vulcan-docs-site

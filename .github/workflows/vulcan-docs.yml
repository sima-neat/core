name: Vulcan Docs

run-name: vulcan-docs (${{ inputs.deploy_environment || vars.VULCAN_ENV || 'stg' }})

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Optional Vulcan docs environment override: dev, stg/staging, or prod/production. Defaults to VULCAN_ENV."
        required: false
        type: string

permissions:
  contents: read
  actions: write
  id-token: write
  packages: read

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.deploy_environment || 'stg' }}
  cancel-in-progress: false

jobs:
  resolve-target:
    name: Resolve Target
    runs-on: ubuntu-latest
    outputs:
      deploy_environment: ${{ steps.target.outputs.deploy_environment }}
    steps:
      - name: Resolve deployment target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            deploy_environment="${{ inputs.deploy_environment }}"
            if [[ -z "${deploy_environment}" ]]; then
              deploy_environment="${{ vars.VULCAN_ENV || 'stg' }}"
            fi
          else
            deploy_environment="${{ vars.VULCAN_ENV || 'stg' }}"
          fi

          case "${deploy_environment}" in
            dev)
              ;;
            stg|staging)
              deploy_environment="stg"
              ;;
            prod|production)
              deploy_environment="prod"
              if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
                echo "Production docs deploy is only allowed from refs/heads/main. Current ref: ${GITHUB_REF}" >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported deployment environment: ${deploy_environment}" >&2
              exit 1
              ;;
          esac

          echo "deploy_environment=${deploy_environment}" >> "${GITHUB_OUTPUT}"

  build-sysdoc-software:
    name: Build SysDoc Software Route
    needs:
      - resolve-target
      - resolve-docs-vars
    uses: sima-neat/.github/.github/workflows/vulcan-build.yml@main
    with:
      vulcan_env: ${{ needs.resolve-target.outputs.deploy_environment }}
      sdk_cache: ${{ needs.resolve-docs-vars.outputs.sdk_cache }}
      capacity: ${{ needs.resolve-docs-vars.outputs.docs_capacity }}
      fetch_depth: 1
      checkout_submodules: "false"
      ensure_sdk_container: true
      sdk_setup_args: "-y -n --minimal --workspace /mnt/vulcan/workspace --no-model-sdk --no-insight"
      artifact_name: vulcan-sysdoc-software-site
      artifact_path: website/build/*
      artifact_retention_days: 1
      build_command: |
        set -euo pipefail

        export DOCS_URL='${{ needs.resolve-docs-vars.outputs.sysdoc_base_url }}'
        export DOCS_GA_MEASUREMENT_ID='${{ vars.DOCS_GA_MEASUREMENT_ID }}'
        export DOCS_STRICT_LINKS=1
        export DOCS_BASE_URL=/software/
        export DOCS_DEVELOPER_CENTER_SHELL_BASE=/

        if [[ -z "${DOCS_URL}" ]]; then
          echo "Missing VULCAN_SYSDOC_URL for environment ${{ needs.resolve-target.outputs.deploy_environment }}." >&2
          exit 1
        fi

        ./build.sh --doc

      post_build_command: |
        set -euo pipefail
        test -d website/build
        test -f website/build/index.html

  resolve-docs-vars:
    name: Resolve Docs Vars
    needs: resolve-target
    uses: sima-neat/.github/.github/workflows/vulcan-resolve-config.yml@main
    with:
      vulcan_env: ${{ needs.resolve-target.outputs.deploy_environment }}

  publish-sysdoc-software:
    name: Publish SysDoc Software Route
    needs:
      - resolve-target
      - resolve-docs-vars
      - build-sysdoc-software
    uses: sima-neat/.github/.github/workflows/vulcan-publish-static-site.yml@main
    with:
      environment_name: ${{ needs.resolve-target.outputs.deploy_environment }}
      site_key: SYSDOC
      aws_region: ${{ needs.resolve-docs-vars.outputs.aws_region }}
      bucket: ${{ needs.resolve-docs-vars.outputs.sysdoc_bucket }}
      role_to_assume: ${{ needs.resolve-docs-vars.outputs.sysdoc_publisher_role_arn }}
      sse_kms_key_id: ${{ needs.resolve-docs-vars.outputs.sysdoc_kms_key_id }}
      cloudfront_distribution_id: ${{ needs.resolve-docs-vars.outputs.sysdoc_cloudfront_distribution_id }}
      cloudfront_paths: "/software /software/*"
      artifact_pattern: vulcan-sysdoc-software-site
      s3_prefix: software

  publish-sysdoc-software-search:
    name: Publish SysDoc Software Search
    needs:
      - resolve-target
      - resolve-docs-vars
      - publish-sysdoc-software
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-target.outputs.deploy_environment }}
    env:
      AWS_REGION: ${{ needs.resolve-docs-vars.outputs.aws_region }}
      VULCAN_CONFIG_S3_URI: ${{ needs.resolve-docs-vars.outputs.config_s3_uri }}
      VULCAN_ENV: ${{ needs.resolve-docs-vars.outputs.vulcan_env }}
      SYSDOC_URL: ${{ needs.resolve-docs-vars.outputs.sysdoc_base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Configure AWS credentials for Vulcan config
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ needs.resolve-docs-vars.outputs.aws_region }}
          role-to-assume: ${{ needs.resolve-docs-vars.outputs.config_reader_role_arn }}
          role-session-name: vulcan-software-search-config-${{ github.run_id }}

      - name: Resolve Algolia publish config
        shell: bash
        run: |
          set -euo pipefail

          config_file="${RUNNER_TEMP}/vulcan-environment.json"
          aws s3 cp "${VULCAN_CONFIG_S3_URI}" "${config_file}" --only-show-errors

          CONFIG_FILE="${config_file}" python3 - <<'PY' >> "${GITHUB_ENV}"
          import json
          import os

          with open(os.environ["CONFIG_FILE"], encoding="utf-8") as handle:
              config = json.load(handle)

          algolia = config.get("algolia") or {}
          values = {
              "ALGOLIA_APP_ID": algolia.get("app_id") or "",
              "ALGOLIA_INDEX_NAME": algolia.get("index_name") or "",
              "ALGOLIA_WRITE_API_KEY_SECRET_ARN": algolia.get("write_api_key_secret_arn") or "",
          }
          for key, value in values.items():
              print(f"{key}={value}")
          PY

      - name: Configure AWS credentials for sysdoc publish
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ needs.resolve-docs-vars.outputs.aws_region }}
          role-to-assume: ${{ needs.resolve-docs-vars.outputs.sysdoc_publisher_role_arn }}
          role-session-name: vulcan-software-search-${{ github.run_id }}

      - name: Publish software records to Algolia
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${ALGOLIA_APP_ID}" && -z "${ALGOLIA_INDEX_NAME}" && -z "${ALGOLIA_WRITE_API_KEY_SECRET_ARN}" ]]; then
            echo "No Algolia config for this Vulcan environment; skipping search index sync."
            exit 0
          fi

          if [[ -z "${ALGOLIA_APP_ID}" || -z "${ALGOLIA_INDEX_NAME}" || -z "${ALGOLIA_WRITE_API_KEY_SECRET_ARN}" ]]; then
            echo "Incomplete Algolia config; app_id, index_name, and write_api_key_secret_arn are required." >&2
            exit 1
          fi

          write_api_key="$(aws secretsmanager get-secret-value \
            --secret-id "${ALGOLIA_WRITE_API_KEY_SECRET_ARN}" \
            --query SecretString \
            --output text)"

          python3 scripts/ci/sync_algolia_developer_center_index.py \
            --docs-dir docs \
            --site-base-url "${SYSDOC_URL}" \
            --app-id "${ALGOLIA_APP_ID}" \
            --api-key "${write_api_key}" \
            --index-name "${ALGOLIA_INDEX_NAME}" \
            --sync

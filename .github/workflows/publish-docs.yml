name: Manually Publish Docs

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: publish-docs
  cancel-in-progress: false

jobs:
  publish-docs:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux, X64]
    env:
      AWS_REGION: us-east-1
      S3_BUCKET: pipeline-session-doc
      CLOUDFRONT_DISTRIBUTION_ID: E27E3TBO4YSCCW

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          ./build.sh --install-deps-only


      - name: Build docs website
        env:
          DOCS_URL: https://ps.modalix.info
          DOCS_BASE_URL: /
          DOCS_ALGOLIA_APP_ID: ${{ secrets.DOCS_ALGOLIA_APP_ID }}
          DOCS_ALGOLIA_API_KEY: ${{ secrets.DOCS_ALGOLIA_API_KEY }}
          DOCS_ALGOLIA_INDEX_NAME: ${{ secrets.DOCS_ALGOLIA_INDEX_NAME }}
        run: |
          if [[ -z "${DOCS_ALGOLIA_APP_ID}" || -z "${DOCS_ALGOLIA_API_KEY}" || -z "${DOCS_ALGOLIA_INDEX_NAME}" ]]; then
            echo "Missing docs build Algolia secrets: DOCS_ALGOLIA_APP_ID / DOCS_ALGOLIA_API_KEY / DOCS_ALGOLIA_INDEX_NAME" >&2
            exit 1
          fi
          ./build.sh --doc

      - name: Verify build output
        run: |
          test -d website/build
          test -f website/build/index.html

      - name: Validate AWS settings
        run: |
          if [ -z "$AWS_REGION" ]; then
            AWS_REGION="us-east-1"
            echo "AWS_REGION not set. Defaulting to us-east-1."
          fi
          if [ -z "$S3_BUCKET" ]; then
            echo "Missing S3_BUCKET."
            exit 1
          fi
          if [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "Missing CLOUDFRONT_DISTRIBUTION_ID."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync website/build/ "s3://${S3_BUCKET}/" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"

      - name: Reindex Algolia docs search
        env:
          ALGOLIA_APP_ID: ${{ secrets.DOCS_ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.DOCS_ALGOLIA_ADMIN_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.DOCS_ALGOLIA_INDEX_NAME }}
        run: |
          if [[ -z "${ALGOLIA_APP_ID}" || -z "${ALGOLIA_ADMIN_API_KEY}" || -z "${ALGOLIA_INDEX_NAME}" ]]; then
            echo "Missing Algolia secrets: DOCS_ALGOLIA_APP_ID / DOCS_ALGOLIA_ADMIN_API_KEY / DOCS_ALGOLIA_INDEX_NAME" >&2
            exit 1
          fi
          bash scripts/ci/sync_algolia_docs_index.sh \
            --docs-dir docs \
            --site-base-url https://ps.modalix.info \
            --clear

name: Manually Publish Docs

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Publish destination"
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

permissions:
  contents: read

concurrency:
  group: publish-docs
  cancel-in-progress: false

jobs:
  publish-docs:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux, X64]
    environment: CloudFlare-R2
    env:
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"
      R2_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Resolve publish configuration
        run: |
          publish_target="${{ inputs.publish_target }}"
          if [[ "$publish_target" == "preview" ]]; then
            echo "S3_BUCKET=docs-preview" >> "$GITHUB_ENV"
            echo "DOCS_URL=https://docs-preview.sima-neat.com" >> "$GITHUB_ENV"
            echo "DOCS_GA_MEASUREMENT_ID=" >> "$GITHUB_ENV"
            echo "SHOULD_REINDEX_ALGOLIA=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "Production docs publish is only allowed from refs/heads/main. Current ref: ${{ github.ref }}" >&2
            exit 1
          fi

          echo "S3_BUCKET=docs" >> "$GITHUB_ENV"
          echo "DOCS_URL=https://docs.sima-neat.com" >> "$GITHUB_ENV"
          echo "DOCS_GA_MEASUREMENT_ID=${{ vars.DOCS_GA_MEASUREMENT_ID }}" >> "$GITHUB_ENV"
          echo "SHOULD_REINDEX_ALGOLIA=true" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          ./build.sh --install-deps-only


      - name: Build docs website
        env:
          DOCS_STRICT_LINKS: "1"
          DOCS_URL: ${{ env.DOCS_URL }}
          DOCS_BASE_URL: /
          DOCS_GA_MEASUREMENT_ID: ${{ env.DOCS_GA_MEASUREMENT_ID }}
          DOCS_ALGOLIA_APP_ID: ${{ secrets.DOCS_ALGOLIA_APP_ID }}
          DOCS_ALGOLIA_API_KEY: ${{ secrets.DOCS_ALGOLIA_API_KEY }}
          DOCS_ALGOLIA_INDEX_NAME: ${{ secrets.DOCS_ALGOLIA_INDEX_NAME }}
        run: |
          if [[ -z "${DOCS_ALGOLIA_APP_ID}" || -z "${DOCS_ALGOLIA_API_KEY}" || -z "${DOCS_ALGOLIA_INDEX_NAME}" ]]; then
            echo "Missing docs build Algolia secrets: DOCS_ALGOLIA_APP_ID / DOCS_ALGOLIA_API_KEY / DOCS_ALGOLIA_INDEX_NAME" >&2
            exit 1
          fi
          ./build.sh --doc

      - name: Verify build output
        run: |
          test -d website/build
          test -f website/build/index.html

      - name: Validate R2 settings
        run: |
          if [ -z "$CLOUDFLARE_R2_ACCESS_KEY_ID" ] || [ -z "$CLOUDFLARE_R2_SECRET_ACCESS_KEY" ]; then
            echo "Missing Cloudflare R2 credentials."
            exit 1
          fi
          if [ -z "$S3_BUCKET" ]; then
            echo "Missing S3_BUCKET."
            exit 1
          fi
          if [ -z "$R2_ENDPOINT_URL" ]; then
            echo "Missing R2 endpoint URL."
            exit 1
          fi

      - name: Verify aws cli is available
        run: |
          aws --version

      - name: Deploy docs to Cloudflare R2
        run: |
          unset AWS_PROFILE AWS_DEFAULT_PROFILE
          AWS_ACCESS_KEY_ID="${CLOUDFLARE_R2_ACCESS_KEY_ID}" \
          AWS_SECRET_ACCESS_KEY="${CLOUDFLARE_R2_SECRET_ACCESS_KEY}" \
          aws s3 sync website/build/ "s3://${S3_BUCKET}/" --delete --endpoint-url "${R2_ENDPOINT_URL}"

      - name: Reindex Algolia docs search
        if: env.SHOULD_REINDEX_ALGOLIA == 'true'
        env:
          ALGOLIA_APP_ID: ${{ secrets.DOCS_ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.DOCS_ALGOLIA_ADMIN_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.DOCS_ALGOLIA_INDEX_NAME }}
        run: |
          if [[ -z "${ALGOLIA_APP_ID}" || -z "${ALGOLIA_ADMIN_API_KEY}" || -z "${ALGOLIA_INDEX_NAME}" ]]; then
            echo "Missing Algolia secrets: DOCS_ALGOLIA_APP_ID / DOCS_ALGOLIA_ADMIN_API_KEY / DOCS_ALGOLIA_INDEX_NAME" >&2
            exit 1
          fi
          bash scripts/ci/sync_algolia_docs_index.sh \
            --docs-dir docs \
            --site-base-url "${DOCS_URL}" \
            --clear

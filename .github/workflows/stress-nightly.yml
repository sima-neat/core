name: Stress Weekly

on:
  schedule:
    - cron: "45 3 * * 1"
  workflow_dispatch: {}

jobs:
  stress-gate:
    name: stress-gate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: ./build.sh --install-deps-only

      - name: Run stress gate
        env:
          SIMA_STRESS_ITERS: "120"
          STRESS_REPEAT_COUNT: "20"
        run: bash scripts/ci/run_stress_gate.sh

  stress-nightly-extended:
    name: stress-nightly-extended
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule'
    needs: stress-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: ./build.sh --install-deps-only

      - name: Run extended stress repeats
        env:
          SIMA_STRESS_ITERS: "400"
          STRESS_REPEAT_COUNT: "100"
        run: bash scripts/ci/run_stress_gate.sh

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 520" role="img" aria-labelledby="ftl ftd">
<title id="ftl">Configure Model Options</title>
<desc id="ftd">`ModelOptions` is the one struct that declares the contract between your input data, the model&#x27;s pipeline stages, and its output decoding.</desc>
<defs>
<linearGradient id="fbg" x1="80" y1="40" x2="1240" y2="500" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F3F8F6"/></linearGradient>
<linearGradient id="fgreen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2A9C4F"/><stop offset="1" stop-color="#C0E8DB"/></linearGradient>
<filter id="fsh" x="-10%" y="-18%" width="120%" height="142%" filterUnits="objectBoundingBox"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#010F0E" flood-opacity="0.12"/></filter>
<marker id="farr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0 0L7 3.5L0 7Z" fill="#2A9C4F"/></marker>
<style>.fsans{font-family:"Avenir Next","Segoe UI",Arial,sans-serif;}.fmono{font-family:"SFMono-Regular","Menlo","Consolas",monospace;}.fttl{fill:#010F0E;font-size:27px;font-weight:700;}.fsub{fill:#35536F;font-size:15px;font-weight:500;}.fcode{fill:#E2ECF6;font-size:14px;font-weight:500;}.fln{fill:#586677;font-size:13px;font-weight:500;}.fcap{fill:#7FD0A6;font-size:14px;font-weight:700;letter-spacing:0.04em;}.fdim{fill:#7D8590;font-size:14px;font-weight:500;}.ftag{fill:#F8FBFF;font-weight:650;}.fnl{fill:#0B2E1B;font-weight:650;}</style>
</defs>

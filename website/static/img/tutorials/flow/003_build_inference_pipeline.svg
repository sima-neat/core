<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 520" role="img" aria-labelledby="ftl ftd">
<title id="ftl">Build an Inference Pipeline</title>
<desc id="ftd">Compose a `Graph` by hand — input node, output node, no model — and run one frame through it.</desc>

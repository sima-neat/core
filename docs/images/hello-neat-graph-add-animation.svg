<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 520" role="img" aria-labelledby="title desc">
  <title id="title">Animated Graph add flow</title>
  <desc id="desc">An animated split view showing Graph code being typed on the left and a Graph app diagram assembling one step at a time on the right.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1240" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F8F6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5998DD"/>
      <stop offset="1" stop-color="#7EB4EC"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A9C4F"/>
      <stop offset="1" stop-color="#C0E8DB"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7A6BB5"/>
      <stop offset="1" stop-color="#D1CEE6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-18%" width="120%" height="142%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#010F0E" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowSmall" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L7 3.5L0 7Z" fill="#2A9C4F"/>
    </marker>
    <marker id="arrowPurple" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L7 3.5L0 7Z" fill="#7A6BB5"/>
    </marker>

    <clipPath id="line1Clip" clipPathUnits="userSpaceOnUse">
      <rect x="116" y="202" width="0" height="28">
        <animate attributeName="width" dur="12s" repeatCount="indefinite" values="0;0;390;390;0" keyTimes="0;0.033;0.15;0.97;1"/>
      </rect>
    </clipPath>
    <clipPath id="line2Clip" clipPathUnits="userSpaceOnUse">
      <rect x="116" y="242" width="0" height="28">
        <animate attributeName="width" dur="12s" repeatCount="indefinite" values="0;0;390;390;0" keyTimes="0;0.2;0.317;0.97;1"/>
      </rect>
    </clipPath>
    <clipPath id="line3Clip" clipPathUnits="userSpaceOnUse">
      <rect x="116" y="282" width="0" height="28">
        <animate attributeName="width" dur="12s" repeatCount="indefinite" values="0;0;390;390;0" keyTimes="0;0.367;0.483;0.97;1"/>
      </rect>
    </clipPath>
    <clipPath id="line4Clip" clipPathUnits="userSpaceOnUse">
      <rect x="116" y="322" width="0" height="28">
        <animate attributeName="width" dur="12s" repeatCount="indefinite" values="0;0;390;390;0" keyTimes="0;0.533;0.65;0.97;1"/>
      </rect>
    </clipPath>

    <style>
      .sans { font-family: "Avenir Next", "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", monospace; }
      .title { fill: #010F0E; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #35536F; font-size: 15px; font-weight: 500; }
      .label { fill: #010F0E; font-size: 20px; font-weight: 650; }
      .small { fill: #35536F; font-size: 15px; font-weight: 500; }
      .tag { fill: #F8FBFF; font-size: 14px; font-weight: 650; letter-spacing: 0.02em; }
      .code { fill: #D8E4EF; font-size: 16.5px; font-weight: 500; }
      .code-dim { fill: #7D8590; font-size: 15px; font-weight: 500; }
      .code-line-bg { fill: #2A3240; opacity: 0; }
      .graph-shell, .step-input, .step-model, .step-output {
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
        animation-duration: 12s;
        animation-iteration-count: infinite;
        animation-fill-mode: both;
      }
      .graph-shell { animation-name: revealShell; }
      .step-input { animation-name: revealInput; }
      .step-model { animation-name: revealModel; }
      .step-output { animation-name: revealOutput; }
      .line-1, .line-2, .line-3, .line-4 {
        animation-duration: 12s;
        animation-iteration-count: infinite;
        animation-fill-mode: both;
      }
      .line-1 { animation-name: pulse1; }
      .line-2 { animation-name: pulse2; }
      .line-3 { animation-name: pulse3; }
      .line-4 { animation-name: pulse4; }
      @keyframes revealShell {
        0%, 15% { opacity: 0; transform: translateY(8px) scale(0.98); }
        18%, 97% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(0) scale(1); }
      }
      @keyframes revealInput {
        0%, 32% { opacity: 0; transform: translateY(8px) scale(0.98); }
        35%, 97% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(0) scale(1); }
      }
      @keyframes revealModel {
        0%, 48% { opacity: 0; transform: translateY(8px) scale(0.98); }
        52%, 97% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(0) scale(1); }
      }
      @keyframes revealOutput {
        0%, 65% { opacity: 0; transform: translateY(8px) scale(0.98); }
        68%, 97% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(0) scale(1); }
      }
      @keyframes pulse1 {
        0%, 2.5%, 15.8%, 100% { opacity: 0; }
        4.2%, 14.2% { opacity: 1; }
      }
      @keyframes pulse2 {
        0%, 19%, 32.5%, 100% { opacity: 0; }
        21%, 31% { opacity: 1; }
      }
      @keyframes pulse3 {
        0%, 35.8%, 49.2%, 100% { opacity: 0; }
        37.5%, 47.5% { opacity: 1; }
      }
      @keyframes pulse4 {
        0%, 52.5%, 65.8%, 100% { opacity: 0; }
        54.2%, 64.2% { opacity: 1; }
      }
    </style>
  </defs>

  <rect x="16" y="16" width="1288" height="488" rx="30" fill="url(#bg)" stroke="#D8E7F1"/>
  <circle cx="1188" cy="82" r="58" fill="#C0E8DB" opacity="0.58"/>
  <circle cx="112" cy="432" r="50" fill="#D1CEE6" opacity="0.5"/>

  <text x="54" y="70" class="sans title">Assembling your Graph</text>
  <text x="54" y="98" class="sans subtitle">Each graph.add(...) call appends the next step in the application pipeline.</text>

  <g filter="url(#shadow)">
    <rect x="54" y="132" width="470" height="316" rx="26" fill="#1F232A"/>
    <rect x="54" y="132" width="470" height="46" rx="26" fill="#181C22"/>
    <circle cx="88" cy="155" r="6" fill="#FF6B6B"/>
    <circle cx="110" cy="155" r="6" fill="#F4C542"/>
    <circle cx="132" cy="155" r="6" fill="#2A9C4F"/>
    <text x="166" y="160" class="mono code-dim">hello_neat_app.py</text>

    <rect class="line-1 code-line-bg" x="76" y="198" width="424" height="32" rx="8"/>
    <rect class="line-2 code-line-bg" x="76" y="238" width="424" height="32" rx="8"/>
    <rect class="line-3 code-line-bg" x="76" y="278" width="424" height="32" rx="8"/>
    <rect class="line-4 code-line-bg" x="76" y="318" width="424" height="32" rx="8"/>

    <text x="86" y="219" class="mono code-dim">1</text>
    <text x="86" y="259" class="mono code-dim">2</text>
    <text x="86" y="299" class="mono code-dim">3</text>
    <text x="86" y="339" class="mono code-dim">4</text>

    <text x="116" y="220" class="mono code" clip-path="url(#line1Clip)">graph = pyneat.Graph("hello_neat_app")</text>
    <text x="116" y="260" class="mono code" clip-path="url(#line2Clip)">graph.add(nodes.input("image"))</text>
    <text x="116" y="300" class="mono code" clip-path="url(#line3Clip)">graph.add(model)</text>
    <text x="116" y="340" class="mono code" clip-path="url(#line4Clip)">graph.add(nodes.output("detections"))</text>
  </g>

  <g filter="url(#shadow)">
    <g class="graph-shell">
      <rect x="560" y="132" width="704" height="316" rx="30" fill="#FFFFFF" stroke="#B8B0DC" stroke-width="2"/>
      <rect x="592" y="158" width="140" height="38" rx="19" fill="url(#purple)"/>
      <text x="662" y="183" class="sans tag" text-anchor="middle">Graph app</text>
      <rect x="1068" y="158" width="150" height="38" rx="19" fill="#F8F6FF" stroke="#B8B0DC"/>
      <text x="1143" y="182" class="sans small" font-weight="650" text-anchor="middle">build(...)</text>
    </g>

    <g class="step-input">
      <rect x="630" y="250" width="140" height="66" rx="18" fill="#F3FBF7" stroke="#9CD5B2"/>
      <text x="700" y="279" class="sans label" font-size="18" text-anchor="middle">Input</text>
      <text x="700" y="300" class="sans small" text-anchor="middle">"image"</text>
    </g>

    <g class="step-model">
      <line x1="782" y1="283" x2="828" y2="283" stroke="#2A9C4F" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowSmall)"/>
      <rect x="842" y="250" width="140" height="66" rx="18" fill="#F3FBF7" stroke="#9CD5B2"/>
      <text x="912" y="279" class="sans label" font-size="18" text-anchor="middle">Model</text>
      <text x="912" y="300" class="sans small" text-anchor="middle">YOLOv8 model</text>

      <path d="M812 386H912V322" fill="none" stroke="#7A6BB5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 6" marker-end="url(#arrowPurple)"/>
      <rect x="640" y="365" width="172" height="42" rx="18" fill="#FFFFFF" stroke="#B8B0DC"/>
      <rect x="658" y="374" width="136" height="24" rx="12" fill="url(#purple)"/>
      <text x="726" y="391" class="sans tag" font-size="12" text-anchor="middle">ModelOptions</text>
    </g>

    <g class="step-output">
      <line x1="994" y1="283" x2="1040" y2="283" stroke="#2A9C4F" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowSmall)"/>
      <rect x="1054" y="250" width="140" height="66" rx="18" fill="#F3FBF7" stroke="#9CD5B2"/>
      <text x="1124" y="279" class="sans label" font-size="18" text-anchor="middle">Output</text>
      <text x="1124" y="300" class="sans small" text-anchor="middle">"detections"</text>
    </g>
  </g>
</svg>

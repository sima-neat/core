<text x="166" y="160" class="fmono fdim">hello_neat.py</text>
<g opacity="0">
<animate attributeName="opacity" dur="12s" repeatCount="indefinite" calcMode="linear" values="0;0;1;1;0;0" keyTimes="0.000;0.060;0.075;0.340;0.360;1.000"/>
<text x="76" y="212" class="fsans fcap">STEP 1 · Write the script</text>
<text x="76" y="248" class="fmono fln">1</text>
<text x="104" y="248" class="fmono fcode" xml:space="preserve">from pyneat import DeviceType</text>
<text x="76" y="274" class="fmono fln">2</text>
<text x="104" y="274" class="fmono fcode" xml:space="preserve">def main():</text>
<text x="76" y="300" class="fmono fln">3</text>
<text x="104" y="300" class="fmono fcode" xml:space="preserve">    print(&quot;Hello from sima-neat&quot;)</text>
<text x="76" y="326" class="fmono fln">4</text>
<text x="104" y="326" class="fmono fcode" xml:space="preserve">    print(&quot;DeviceType.CPU =&quot;, DeviceType.CPU)</text>
</g>
<g opacity="0">
<animate attributeName="opacity" dur="12s" repeatCount="indefinite" calcMode="linear" values="0;0;1;1;0;0" keyTimes="0.000;0.360;0.375;0.640;0.660;1.000"/>
<text x="76" y="212" class="fsans fcap">STEP 2 · Run on the DevKit</text>
<text x="76" y="248" class="fmono fln">1</text>
<text x="104" y="248" class="fmono fcode" xml:space="preserve">source ~/pyneat/bin/activate</text>
<text x="76" y="274" class="fmono fln">2</text>
<text x="104" y="274" class="fmono fcode" xml:space="preserve">python3 hello_neat.py</text>
</g>
<g opacity="0">
<animate attributeName="opacity" dur="12s" repeatCount="indefinite" calcMode="linear" values="0;0;1;1;0;0" keyTimes="0.000;0.660;0.675;0.965;0.985;1.000"/>
<text x="76" y="212" class="fsans fcap">STEP 3 · Runtime responds</text>
<text x="76" y="248" class="fmono fln">1</text>
<text x="104" y="248" class="fmono fcode" xml:space="preserve">Hello from sima-neat</text>
<text x="76" y="274" class="fmono fln">2</text>
<text x="104" y="274" class="fmono fcode" xml:space="preserve">DeviceType.CPU = DeviceType.CPU</text>
</g>
</g>

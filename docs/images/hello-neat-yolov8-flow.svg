<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 400" role="img" aria-labelledby="title desc">
  <title id="title">Hello Neat YOLOv8 application flow</title>
  <desc id="desc">A left-to-right flow showing a sample image converted into a tensor, passed into model.run, processed by a model pipeline generated from yolo_v8s_mpk.tar.gz, and reported as a detection summary.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1240" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F8F6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5998DD"/>
      <stop offset="1" stop-color="#7EB4EC"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A9C4F"/>
      <stop offset="1" stop-color="#C0E8DB"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7A6BB5"/>
      <stop offset="1" stop-color="#D1CEE6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-18%" width="120%" height="140%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#010F0E" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L8 4L0 8Z" fill="#2A9C4F"/>
    </marker>
    <marker id="arrowSmall" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L7 3.5L0 7Z" fill="#2A9C4F"/>
    </marker>
    <marker id="arrowPurple" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L7 3.5L0 7Z" fill="#7A6BB5"/>
    </marker>
    <style>
      .sans { font-family: "Avenir Next", "Segoe UI", Arial, sans-serif; }
      .title { fill: #010F0E; font-size: 28px; font-weight: 700; }
      .label { fill: #010F0E; font-size: 20px; font-weight: 650; }
      .small { fill: #35536F; font-size: 15px; font-weight: 500; }
      .tag { fill: #F8FBFF; font-size: 14px; font-weight: 650; letter-spacing: 0.02em; }
      .runTitle { fill: #010F0E; font-size: 24px; font-weight: 700; }
      .runSub { fill: #35536F; font-size: 15px; font-weight: 500; }
    </style>
  </defs>

  <rect x="16" y="16" width="1288" height="368" rx="30" fill="url(#bg)" stroke="#D8E7F1"/>
  <circle cx="1160" cy="78" r="58" fill="#C0E8DB" opacity="0.6"/>
  <circle cx="116" cy="322" r="42" fill="#D1CEE6" opacity="0.54"/>

  <text x="54" y="70" class="sans title">Example YOLOv8 flow</text>
  <text x="54" y="98" class="sans small">The tutorial turns one image into a tensor, runs the generated model pipeline, and prints a detection summary.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="158" width="180" height="122" rx="24" fill="#FFFFFF" stroke="#D6E2EF"/>
    <rect x="141" y="180" width="78" height="34" rx="17" fill="url(#blue)"/>
    <text x="180" y="202" class="sans tag" text-anchor="middle">INPUT</text>
    <text x="180" y="240" class="sans label" text-anchor="middle">Image</text>
    <text x="180" y="264" class="sans small" text-anchor="middle">PNG to Tensor</text>
  </g>

  <line x1="280" y1="219" x2="366" y2="219" stroke="#2A9C4F" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="380" y="128" width="650" height="182" rx="30" fill="#FFFFFF" stroke="#A8D7C6" stroke-width="2"/>
    <rect x="408" y="150" width="116" height="36" rx="18" fill="url(#green)"/>
    <text x="466" y="174" class="sans tag" text-anchor="middle">Model</text>
    <rect x="862" y="150" width="130" height="36" rx="18" fill="#F3FBF7" stroke="#9CD5B2"/>
    <text x="927" y="174" class="sans small" font-weight="650" text-anchor="middle">model.run(...)</text>

    <rect x="440" y="212" width="150" height="62" rx="18" fill="#F5FAFF" stroke="#A9CDED"/>
    <text x="515" y="240" class="sans label" font-size="18" text-anchor="middle">Preprocess</text>
    <text x="515" y="260" class="sans small" text-anchor="middle">resize + norm</text>

    <line x1="600" y1="243" x2="648" y2="243" stroke="#2A9C4F" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowSmall)"/>

    <rect x="662" y="212" width="150" height="62" rx="18" fill="#F3FBF7" stroke="#9CD5B2"/>
    <text x="737" y="240" class="sans label" font-size="18" text-anchor="middle">YOLOv8</text>
    <text x="737" y="260" class="sans small" text-anchor="middle">inference</text>

    <line x1="822" y1="243" x2="870" y2="243" stroke="#2A9C4F" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowSmall)"/>

    <rect x="884" y="212" width="108" height="62" rx="18" fill="#F3FBF7" stroke="#9CD5B2"/>
    <text x="938" y="240" class="sans label" font-size="18" text-anchor="middle">Box</text>
    <text x="938" y="260" class="sans small" text-anchor="middle">decode</text>

    <text x="705" y="294" class="sans runSub" text-anchor="middle">generated from yolo_v8s_mpk.tar.gz</text>
  </g>

  <path d="M660 360H705V314" fill="none" stroke="#7A6BB5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 7" marker-end="url(#arrowPurple)"/>

  <g filter="url(#shadow)">
    <rect x="380" y="336" width="280" height="48" rx="20" fill="#FFFFFF" stroke="#B8B0DC"/>
    <rect x="407" y="347" width="226" height="26" rx="13" fill="url(#purple)"/>
    <text x="520" y="365" class="sans tag" font-size="13" text-anchor="middle">ModelOptions</text>
  </g>

  <line x1="1040" y1="219" x2="1106" y2="219" stroke="#2A9C4F" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="1120" y="158" width="140" height="122" rx="24" fill="#FFFFFF" stroke="#A8D7C6"/>
    <rect x="1166" y="180" width="48" height="34" rx="17" fill="url(#green)"/>
    <text x="1190" y="202" class="sans tag" text-anchor="middle">OUT</text>
    <text x="1190" y="240" class="sans label" text-anchor="middle">Count</text>
    <text x="1190" y="264" class="sans small" text-anchor="middle">detections</text>
  </g>
</svg>
